            {suggestions.map(s=><div key={s.id} onClick={()=>selectSuggestion(s)} style={{padding:"10px 14px",cursor:"pointer",borderBottom:"1px solid #f4f4f5",fontSize:13,display:"flex",justifyContent:"space-between",alignItems:"center"}}
              onMouseEnter={e=>e.currentTarget.style.background="#f4f4f5"} onMouseLeave={e=>e.currentTarget.style.background="#fff"}>
              <div><div style={{fontWeight:600}}>{s.name}</div><div style={{fontSize:10,color:"#a1a1aa"}}>{s.role} · {fmt(s.bruto)}</div></div>
              <span className={`badge ${s.regimen==="planilla"?"bb":"bpp"}`} style={{fontSize:10}}>{s.regimen==="planilla"?"Planilla":"RH"}</span>
            </div>)}
          </div>}
        </div>
        <select value={fd.regimen} onChange={e=>setFd({...fd,regimen:e.target.value})}>
          <option value="planilla">Planilla</option><option value="rh">RH</option>
        </select>
      </div>
      <div className="form-row" style={{alignItems:"center"}}>
        <input type="number" value={fd.bruto} onChange={e=>setFd({...fd,bruto:e.target.value})} placeholder={isRH?"Monto RH (S/)":"Sueldo Bruto (S/)"}/>
        <select value={fd.role} onChange={e=>setFd({...fd,role:e.target.value})} style={{minWidth:140}}>
          <option value="">Puesto...</option>
          {(roles||[]).map(r=><option key={r} value={r}>{r}</option>)}
        </select>
      </div>
      {!isRH&&bruto>0&&<div style={{fontSize:11,color:"#71717a",lineHeight:1.6,marginBottom:8,padding:"6px 10px",background:"#fff",borderRadius:8}}>

          <option value="__trans__">Transversal (OH)</option>
          {clients.map(c=><option key={c.id} value={c.id}>{c.name}</option>)}
        </select>
        <select value={assigns[0]?.role||fd.role} onChange={e=>setAssigns(prev=>[{...prev[0],role:e.target.value},...prev.slice(1)])} style={{flex:1,fontSize:12,padding:"5px 6px"}}>
          <option value="">Puesto...</option>
          {(roles||[]).map(r=><option key={r} value={r}>{r}</option>)}
        </select>
        <div style={{width:100,fontSize:13,fontWeight:700,textAlign:"right",padding:"5px 6px",color:"#2563eb"}}>{fmt(primaryAmount)}</div>
      </div>

      {assigns.filter(a=>!a.isPrimary).length>0&&<div style={{fontSize:12,fontWeight:700,color:"#71717a",margin:"12px 0 6px"}}>Bonos / Otras marcas</div>}
      {assigns.filter(a=>!a.isPrimary).map(a=>(
        <div key={a.id} style={{display:"flex",gap:4,marginBottom:4,alignItems:"center"}}>
          <select value={a.clientId!==null&&a.clientId!==undefined&&a.clientId!=="__trans__"?String(a.clientId):"__trans__"} onChange={e=>{const v=e.target.value;setAssigns(prev=>prev.map(x=>x.id===a.id?{...x,clientId:v==="__trans__"?null:parseInt(v)}:x));}} style={{width:160,fontSize:12,padding:"5px 6px"}}>
            <option value="__trans__">Transversal</option>
            {clients.map(c=><option key={c.id} value={c.id}>{c.name}</option>)}

          <select value={a.role} onChange={e=>setAssigns(prev=>prev.map(x=>x.id===a.id?{...x,role:e.target.value}:x))} style={{flex:1,fontSize:12,padding:"5px 6px"}}>

/* ═══ AUTH WRAPPER ═══ */
function AuthWrapper(){
  const[user,setUser]=useState(null);
  const[userRole,setUserRole]=useState(null);
  const[roleChecked,setRoleChecked]=useState(false);
  const[loading,setLoading]=useState(true);
  const[authMode,setAuthMode]=useState("login"); /* login, setup */
  const[email,setEmail]=useState("");
  const[password,setPassword]=useState("");
  const[error,setError]=useState("");
  const[info,setInfo]=useState("");

  const sbCfg=getSBConfig();
  const hasConfig=!!(sbCfg?.url&&sbCfg?.key);

  /* Check user role after login */
  const checkRole=async(userEmail)=>{
    const sb=getSB();if(!sb){setRoleChecked(true);return;}
    try{
      const{data,error:err}=await sb.from("user_roles").select("rol").eq("email",userEmail).eq("activo",true).single();
      if(!err&&data)setUserRole(data.rol);
      else setUserRole(null); /* No role found = no access */
    }catch(e){setUserRole(null);}
    setRoleChecked(true);
  };

  useEffect(()=>{
    if(!hasConfig){setLoading(false);setUser({email:"local",mode:"local"});setUserRole("admin");setRoleChecked(true);return;}
    const sb=getSB();if(!sb){setLoading(false);return;}
    sb.auth.getSession().then(({data:{session}})=>{
      if(session?.user){setUser({email:session.user.email,mode:"cloud"});checkRole(session.user.email);}
      setLoading(false);
    });
    const{data:{subscription}}=sb.auth.onAuthStateChange((_,session)=>{
      if(session?.user){setUser({email:session.user.email,mode:"cloud"});checkRole(session.user.email);}
      else{setUser(null);setUserRole(null);setRoleChecked(false);}
    });
    return()=>subscription.unsubscribe();
  },[]);

  const handleLogin=async(e)=>{
    e.preventDefault();setError("");
    const sb=getSB();if(!sb){setError("Supabase no configurado");return;}
    const{error:err}=await sb.auth.signInWithPassword({email,password});
    if(err)setError(err.message==="Invalid login credentials"?"Email o contraseña incorrectos":err.message);
  };
  const handleSignup=async(e)=>{
    e.preventDefault();setError("");setInfo("");
    const sb=getSB();if(!sb){setError("Supabase no configurado");return;}
    const{error:err}=await sb.auth.signUp({email,password});
    if(err)setError(err.message);
    else setInfo("Cuenta creada. Revisa tu email para confirmar (puede estar en spam).");
  };
  const handleGoogleLogin=async()=>{
    setError("");
    const sb=getSB();if(!sb){setError("Supabase no configurado");return;}
    const{error:err}=await sb.auth.signInWithOAuth({provider:"google",options:{redirectTo:window.location.origin}});
    if(err)setError(err.message);
  };
  const handleLogout=async()=>{const sb=getSB();if(sb)await sb.auth.signOut();setUser(null);};

  if(loading)return(<div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"100vh",fontFamily:"Inter,sans-serif"}}>
    <div style={{textAlign:"center"}}><Logo width={160} color="#18181b"/><div style={{color:"#a1a1aa",fontSize:13,marginTop:12}}>Cargando...</div></div>
  </div>);

  /* No Supabase config — run in local mode silently */
  if(!hasConfig&&user?.mode==="local")return <App userEmail="local" onLogout={()=>{}} cloudMode={false}/>;

  /* Supabase configured but not logged in */
  if(hasConfig&&!user)return(
    <div style={{display:"flex",alignItems:"center",justifyContent:"center",minHeight:"100vh",background:"#fafafa",fontFamily:"Inter,sans-serif"}}>
      <div style={{background:"#fff",borderRadius:24,padding:36,width:400,border:"1px solid #f0f0f0"}}>
        <div style={{textAlign:"center",marginBottom:32}}>
          <Logo width={180} color="#18181b"/>
          <div style={{fontSize:12,color:"#a1a1aa",marginTop:10,letterSpacing:"1px",textTransform:"uppercase",fontWeight:600}}>Finanzas</div>
        </div>
        {error&&<div style={{background:"#dc2626",color:"#fff",padding:"10px 14px",borderRadius:12,fontSize:12,marginBottom:14,fontWeight:600,textAlign:"center"}}>{error}</div>}
        {info&&<div style={{background:"#18181b",color:"#fff",padding:"10px 14px",borderRadius:12,fontSize:12,marginBottom:14,fontWeight:600,textAlign:"center"}}>{info}</div>}
        <button onClick={handleGoogleLogin} style={{width:"100%",padding:"14px",background:"#fff",color:"#18181b",border:"1.5px solid #e4e4e7",borderRadius:14,fontSize:14,fontWeight:600,cursor:"pointer",fontFamily:"inherit",display:"flex",alignItems:"center",justifyContent:"center",gap:10,marginBottom:16}}>
          <svg width="18" height="18" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
          Ingresar con Google
        </button>
        <div style={{display:"flex",alignItems:"center",gap:12,margin:"4px 0 16px"}}>
          <div style={{flex:1,height:1,background:"#f0f0f0"}}/>
          <span style={{fontSize:11,color:"#a1a1aa"}}>o</span>
          <div style={{flex:1,height:1,background:"#f0f0f0"}}/>
        </div>
        <form onSubmit={handleLogin}>
          <div style={{marginBottom:14}}>
            <input type="email" value={email} onChange={e=>setEmail(e.target.value)} required placeholder="Email" style={{width:"100%",padding:"12px 16px",border:"1.5px solid #e4e4e7",borderRadius:12,fontSize:14,fontFamily:"inherit"}}/></div>
          <div style={{marginBottom:18}}>
            <input type="password" value={password} onChange={e=>setPassword(e.target.value)} required minLength={6} placeholder="Contrasena" style={{width:"100%",padding:"12px 16px",border:"1.5px solid #e4e4e7",borderRadius:12,fontSize:14,fontFamily:"inherit"}}/></div>
          <button type="submit" style={{width:"100%",padding:"14px",background:"#18181b",color:"#fff",border:"none",borderRadius:12,fontSize:14,fontWeight:700,cursor:"pointer",fontFamily:"inherit",letterSpacing:"-.2px",marginBottom:8}}>Ingresar</button>
          <button type="button" onClick={handleSignup} style={{width:"100%",padding:"12px",background:"#f4f4f5",color:"#52525b",border:"none",borderRadius:12,fontSize:13,fontWeight:600,cursor:"pointer",fontFamily:"inherit"}}>Crear cuenta</button>
        </form>
        <div style={{marginTop:20,textAlign:"center"}}>
          <button onClick={()=>{setSBConfig(null);_sb=null;location.reload();}} style={{background:"none",border:"none",color:"#a1a1aa",fontSize:11,cursor:"pointer",fontFamily:"inherit"}}>Desconectar</button>
        </div>
      </div>
    </div>
  );

  /* Logged in — check role */
  if(!roleChecked)return(<div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"100vh",fontFamily:"Inter,sans-serif"}}>
    <div style={{textAlign:"center"}}><Logo width={160}/><div style={{color:"#a1a1aa",fontSize:13,marginTop:12}}>Verificando acceso...</div></div></div>);

  if(userRole!=="admin")return(
    <div style={{display:"flex",alignItems:"center",justifyContent:"center",minHeight:"100vh",background:"#fafafa",fontFamily:"Inter,sans-serif"}}>
      <div style={{background:"#fff",borderRadius:24,padding:40,width:420,border:"1px solid #f0f0f0",textAlign:"center"}}>
        <Logo width={160} color="#18181b"/>
        <div style={{fontSize:48,margin:"24px 0 12px",opacity:.3}}>🔒</div>
        <div style={{fontSize:18,fontWeight:800,marginBottom:6}}>Acceso restringido</div>
        <div style={{fontSize:13,color:"#71717a",marginBottom:20,lineHeight:1.6}}>
          {user?.email&&<span>Sesión: <strong>{user.email}</strong><br/></span>}
          Esta aplicación es solo para administradores de NotOffice.<br/>
          Si necesitas acceso, contacta a Gerardo.
        </div>
        <button onClick={handleLogout} style={{padding:"12px 24px",background:"#18181b",color:"#fff",border:"none",borderRadius:12,fontSize:13,fontWeight:600,cursor:"pointer",fontFamily:"inherit"}}>Cerrar sesión</button>
      </div>
    </div>
  );

  return <App userEmail={user?.email||"local"} onLogout={handleLogout} cloudMode={hasConfig}/>;
}

/* ═══ SETUP SUPABASE (in Config page) ═══ */
function SupabaseSetup({onDone}){
  const cfg=getSBConfig()||{};
  const[url,setUrl]=useState(cfg.url||"");
  const[key,setKey]=useState(cfg.key||"");
  const[testing,setTesting]=useState(false);
  const[result,setResult]=useState("");
  const test=async()=>{
    if(!url||!key){setResult("Completa ambos campos.");return;}
    setTesting(true);setResult("");
    try{const sb=supabase.createClient(url,key);
      const{data,error}=await sb.from("app_state").select("id").limit(1);
      if(error)setResult("Error: "+error.message+". Verifica la URL, key, y que hayas ejecutado el SQL.");
      else{setResult("Conexión exitosa. Guardando...");setSBConfig({url,key});_sb=null;
        setTimeout(()=>{if(onDone)onDone();else location.reload();},1500);}
    }catch(e){setResult("Error de conexión: "+e.message);}
    setTesting(false);
  };
  return(<div className="card" style={{marginBottom:16}}>
    <div style={{fontWeight:800,fontSize:16,marginBottom:6,color:"#18181b",letterSpacing:"-.3px"}}>Conectar a la nube</div>
    <div style={{fontSize:12,color:"#a1a1aa",marginBottom:16,lineHeight:1.6}}>Conecta a Supabase para datos compartidos, backups y acceso multi-dispositivo.</div>
    <div style={{marginBottom:8}}><label style={{fontSize:11,color:"#71717a",display:"block",marginBottom:4}}>Supabase URL</label>
      <input value={url} onChange={e=>setUrl(e.target.value)} placeholder="https://xxx.supabase.co" style={{width:"100%",padding:"8px 12px",border:"1px solid #e4e4e7",borderRadius:8,fontSize:13,fontFamily:"inherit"}}/></div>
    <div style={{marginBottom:12}}><label style={{fontSize:11,color:"#71717a",display:"block",marginBottom:4}}>Supabase Anon Key</label>
      <input value={key} onChange={e=>setKey(e.target.value)} placeholder="eyJhbGci..." style={{width:"100%",padding:"8px 12px",border:"1px solid #e4e4e7",borderRadius:8,fontSize:13,fontFamily:"inherit"}}/></div>
    <div style={{display:"flex",gap:8,alignItems:"center"}}>
      <button className="btn btn-green" onClick={test} disabled={testing}>{testing?"Probando...":"Probar y Conectar"}</button>
      {cfg.url&&<button className="btn btn-gray" onClick={()=>{setSBConfig(null);_sb=null;location.reload();}}>Desconectar</button>}
    </div>
    {result&&<div style={{marginTop:8,fontSize:12,padding:"8px 12px",borderRadius:8,background:result.includes("exitosa")?"#fafafa":"#fff1f2",color:result.includes("exitosa")?"#18181b":"#dc2626"}}>{result}</div>}
    {cfg.url&&<div style={{marginTop:8,fontSize:11,color:"#18181b"}}>Conectado a: {cfg.url}</div>}
  </div>);
}

ReactDOM.render(<AuthWrapper/>,document.getElementById("root"));
</script>
