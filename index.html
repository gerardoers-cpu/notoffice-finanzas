*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',system-ui,-apple-system,sans-serif;background:#fafafa;color:#18181b}
.app{display:flex;min-height:100vh}

/* ── Sidebar: clean dark ── */
.sidebar{width:240px;background:#18181b;padding:20px 14px;flex-shrink:0;overflow-y:auto}
.sidebar-brand{display:flex;align-items:center;gap:10px;padding:8px 10px 20px;border-bottom:1px solid rgba(255,255,255,.06);margin-bottom:16px}
.sidebar-brand span{font-weight:800;font-size:16px;color:#fff;letter-spacing:-.3px}
.nav-section{font-size:9px;text-transform:uppercase;letter-spacing:1.5px;color:rgba(255,255,255,.25);font-weight:700;padding:14px 10px 6px;margin-top:4px}
.nav-btn{width:100%;display:flex;align-items:center;gap:10px;padding:10px 12px;border:none;border-radius:10px;background:transparent;color:rgba(255,255,255,.45);font-size:13px;cursor:pointer;transition:all .15s;text-align:left;font-family:inherit;font-weight:500}
.nav-btn:hover{background:rgba(255,255,255,.06);color:#fff}
.nav-btn.active{background:#fff;color:#18181b;font-weight:600}

/* ── Main Area ── */
.main{flex:1;display:flex;flex-direction:column;min-width:0}
.header{background:#fff;border-bottom:1px solid #f0f0f0;padding:16px 32px;display:flex;align-items:center;justify-content:space-between}
.header h1{font-size:22px;font-weight:800;letter-spacing:-.5px}
.content{flex:1;overflow-y:auto;padding:28px 32px}
.ci{max-width:1100px;margin:0 auto}

/* ── Grid System ── */
.grid{display:grid;gap:14px}
.g2{grid-template-columns:repeat(2,1fr)}.g3{grid-template-columns:repeat(3,1fr)}.g4{grid-template-columns:repeat(4,1fr)}.g5{grid-template-columns:repeat(5,1fr)}
@media(max-width:900px){.g3,.g4,.g5{grid-template-columns:repeat(2,1fr)}.sidebar{display:none}}

/* ── Cards ── */
.card{background:#fff;border-radius:16px;padding:20px;border:1px solid #f0f0f0}
.kpi-label{font-size:10px;text-transform:uppercase;letter-spacing:1px;color:#a1a1aa;font-weight:600}
.kpi-value{font-size:24px;font-weight:800;margin-top:6px;color:#18181b;letter-spacing:-.5px}
.kpi-sub{font-size:11px;color:#a1a1aa;margin-top:4px}

/* ── Section Label ── */
.sl{font-size:10px;text-transform:uppercase;letter-spacing:1.2px;color:#a1a1aa;margin:20px 0 10px;font-weight:700}

/* ── Tables ── */
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;padding:10px 14px;font-size:10px;text-transform:uppercase;letter-spacing:.8px;color:#a1a1aa;border-bottom:2px solid #f0f0f0;font-weight:700}
td{padding:12px 14px;border-bottom:1px solid #f4f4f5}
tr:hover td{background:#fafafa}

/* ── Color utilities ── */

.text-right{text-align:right}.text-center{text-align:center}.font-bold{font-weight:700}

/* ── Badges ── */
.badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:10px;font-weight:600}
.bg{background:#eff6ff;color:#2563eb}.ba{background:#fef2f2;color:#dc2626}.br{background:#fef2f2;color:#dc2626}.bb{background:#f4f4f5;color:#3f3f46}.bpp{background:#f4f4f5;color:#52525b}

/* ── Buttons ── */
.btn{padding:9px 18px;border:none;border-radius:10px;font-size:12px;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;gap:6px;font-family:inherit;transition:all .15s;letter-spacing:-.1px}
.btn-green{background:#18181b;color:#fff}.btn-green:hover{background:#27272a}
.btn-red{background:#dc2626;color:#fff}.btn-blue{background:#3f3f46;color:#fff}
.btn-gray{background:#f4f4f5;color:#52525b}.btn-gray:hover{background:#e4e4e7}
.btn-sm{padding:6px 12px;font-size:11px}

/* ── Form Elements ── */
input,select{padding:9px 14px;border:1.5px solid #e4e4e7;border-radius:10px;font-size:13px;font-family:inherit;background:#fff;color:#18181b;outline:none;transition:border-color .15s}

.form-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:8px;margin-bottom:8px}
.form-card{background:#fff;border:1px solid #f0f0f0;border-radius:16px;padding:20px;margin-bottom:14px}

.alert{padding:14px 18px;border-radius:12px;display:flex;align-items:flex-start;gap:10px;margin-bottom:8px;font-size:13px}
.alert-amber{background:#fef2f2;border:1px solid #fecaca}

.detail-row{display:flex;justify-content:space-between;padding:12px 0;border-bottom:1px solid #f4f4f5;font-size:14px}
.user-bar{display:flex;align-items:center;gap:8px;font-size:13px;color:#71717a}

/* ── Tabs ── */
.tabs{display:flex;gap:4px;margin-bottom:18px;background:#f4f4f5;border-radius:12px;padding:4px;flex-wrap:wrap}

const loadStateCloud=async()=>{
  const sb=getSB();if(!sb){console.error("[CLOUD] No Supabase client");return null;}
  try{
    /* Intentar con columna "data" primero, luego "state" como fallback */
    let{data,error}=await sb.from("app_state").select("*").eq("id","main").single();
    console.log("[CLOUD] Raw response:",{data,error});

    const payload=data.data||data.state||null;
    console.log("[CLOUD] Payload keys:",payload?Object.keys(payload):"NULL");
    console.log("[CLOUD] Clients count:",payload?.clients?.length||0);
    if(payload&&Object.keys(payload).length>0)return payload;
    return null;
  }catch(e){console.error("[CLOUD] Load exception:",e);return null;}

/* ═══ CSV Export helper ═══ */
const exportCSV=(filename,headers,rows)=>{
  const esc=v=>{const s=String(v==null?"":v);return s.includes(",")||s.includes('"')||s.includes('\n')?'"'+s.replace(/"/g,'""')+'"':s;};
  const csv=[headers.map(esc).join(","),...rows.map(r=>r.map(esc).join(","))].join("\n");
  const blob=new Blob(["\uFEFF"+csv],{type:"text/csv;charset=utf-8"});
  const url=URL.createObjectURL(blob);const a=document.createElement("a");a.href=url;a.download=filename;a.click();URL.revokeObjectURL(url);
};

function App({userEmail="local",onLogout,cloudMode=false}){
  const[initialLoaded,setInitialLoaded]=useState(false);
  const saved=useRef(loadStateLocal()).current;
  const[page,setPage]=useState("recurrentes");
  const[vm,setVm]=useState(DEFAULT_VM);
  const selYear=parseInt(vm.split("-")[0]);
  const yearMonths=getYearMonths(selYear);
  /* Override global MONTHS for calculations in this render */
  MONTHS=yearMonths;
  const[selClient,setSelClient]=useState(null);
  const[showForm,setShowForm]=useState(null);
  const[statusFilter,setStatusFilter]=useState("");
  const[facturaTab,setFacturaTab]=useState("recurrente");
  const[gastoTab,setGastoTab]=useState("fijos");
  const[showAsignarCaja,setShowAsignarCaja]=useState(false);
  const[asigPersona,setAsigPersona]=useState("");
  const[asigMonto,setAsigMonto]=useState("");
  const[asigNota,setAsigNota]=useState("");
  const[showRegistrarGasto,setShowRegistrarGasto]=useState(false);
  const[gastoForm,setGastoForm]=useState({persona:"",fecha:"",concepto:"",categoria:"Materiales",marca:"Agencia",monto:"",reembolsable:false});
  const[expandedCajaPersona,setExpandedCajaPersona]=useState(null);
  const[expandedMovPersona,setExpandedMovPersona]=useState(null);
  const[editingAsigId,setEditingAsigId]=useState(null);
  const[editAsigMonto,setEditAsigMonto]=useState("");
  const[editAsigNota,setEditAsigNota]=useState("");
  const handleAsignarCaja=async()=>{
    if(!asigPersona||!asigMonto||parseFloat(asigMonto)<=0){alert("Selecciona persona y monto");return;}
    const sb=getSB();if(!sb){alert("Sin conexión a Supabase");return;}
    const{error}=await sb.from("caja_chica_asignaciones").insert({
      persona_email:asigPersona,persona_name:asigPersona.split("@")[0].replace(/\./g," ").replace(/\b\w/g,c=>c.toUpperCase()),
      monto:parseFloat(asigMonto),nota:asigNota.trim()||"Asignación de caja chica",asignado_por:userEmail,mes:vm
    });
    if(error)alert("Error: "+error.message);
    else{setAsigMonto("");setAsigNota("");setAsigPersona("");setShowAsignarCaja(false);loadCajaChica(vm);setSaveMsg("Caja chica asignada");setTimeout(()=>setSaveMsg(""),3000);}
  };
  const handleRegistrarGasto=async()=>{
    const g=gastoForm;
    if(!g.persona||!g.fecha||!g.concepto||!g.monto||parseFloat(g.monto)<=0){alert("Completa persona, fecha, concepto y monto");return;}
    const sb=getSB();if(!sb){alert("Sin conexión a Supabase");return;}
    const persona=cajaPersonas.find(cp=>cp.email===g.persona);
    const mes=g.fecha.slice(0,7);
    /* Si es reembolsable → tipo="cliente", via_pago="prestamo", estado_cobro="pendiente"
       Si NO es reembolsable → tipo="agencia", via_pago="caja_chica" */
    const esReembolsable=g.reembolsable;
    const{error}=await sb.from("caja_chica").insert({
      user_email:g.persona,user_name:persona?.nombre||nameFromEmail(g.persona),
      fecha:g.fecha,concepto:g.concepto,categoria:g.categoria,marca:g.marca,
      tipo:esReembolsable?"cliente":"agencia",
      via_pago:esReembolsable?"prestamo":"caja_chica",
      estado_cobro:esReembolsable?"pendiente":null,
      monto:parseFloat(g.monto),
      registrado_por:userEmail,mes,origen:"web"
    });
    if(error)alert("Error: "+error.message);
    else{
      setGastoForm({persona:"",fecha:"",concepto:"",categoria:"Materiales",marca:"Agencia",monto:"",reembolsable:false});
      setShowRegistrarGasto(false);loadCajaChica(vm);
      setSaveMsg(esReembolsable?"Gasto registrado + préstamo creado":"Gasto registrado");
      setTimeout(()=>setSaveMsg(""),3000);
    }
  };
  const[saveMsg,setSaveMsg]=useState("");

  const[clients,setClients]=useState(saved?.clients||INIT_CLIENTS);
  /* ── Team por mes: cada mes tiene su propia lista independiente ── */
  const[teamByMonth,setTeamByMonth]=useState(()=>{
    if(saved?.teamByMonth)return saved.teamByMonth;
    /* Migración: team viejo (array global) → poner en todos los meses */
    if(saved?.team&&saved.team.length>0){const m={};ALL_MONTHS.forEach(mo=>{m[mo.value]=saved.team.map(t=>({...t}));});return m;}
    return{};
  });
  const team=teamByMonth[vm]||[];
  const setTeam=(updater)=>setTeamByMonth(prev=>{
    const cur=prev[vm]||[];
    const next=typeof updater==="function"?updater(cur):updater;
    return{...prev,[vm]:next};
  });
  const copyTeamFromPrev=()=>{
    const mIdx=ALL_MONTHS.findIndex(m=>m.value===vm);
    if(mIdx<=0)return;
    const prevMonth=ALL_MONTHS[mIdx-1].value;
    const prevTeam=teamByMonth[prevMonth]||[];
    if(prevTeam.length===0){alert("El mes anterior no tiene equipo registrado.");return;}
    if(team.length>0&&!confirm("Ya hay personas en este mes. ¿Reemplazar con el equipo del mes anterior?"))return;
    /* Excluir personas con liquidación (ya se fueron) y limpiar el campo liquidacion */
    setTeamByMonth(prev=>({...prev,[vm]:prevTeam.filter(t=>!t.liquidacion||t.liquidacion<=0).map(t=>({...t,id:Date.now()+Math.random(),liquidacion:0}))}));
  };
  const[invoices,setInvoices]=useState(saved?.invoices||genInvoices);
  const[projects,setProjects]=useState(saved?.projects||INIT_PROJECTS);
  const[fixedExp,setFixedExp]=useState(saved?.fixedExp||INIT_FIXED);
  const[digitalExp,setDigitalExp]=useState(saved?.digitalExp||INIT_DIGITAL);
  const[variableExp,setVariableExp]=useState(saved?.variableExp||INIT_VAR);
  const[officeExp,setOfficeExp]=useState(saved?.officeExp||INIT_OFFICE);
  const[investExp,setInvestExp]=useState(saved?.investExp||INIT_INV);
  const[staff,setStaff]=useState(saved?.staff||INIT_STAFF);
  const[roles,setRoles]=useState(saved?.roles||INIT_ROLES);
  const[editStaffId,setEditStaffId]=useState(null);
  /* Per-month fees: { month: { clientId: { base:number, services:[{id,name,amount}] } } } */
  const[clientFees,setClientFees]=useState(saved?.clientFees||initFees);
  const getEntry=(cId,m)=>(clientFees[m]&&clientFees[m][cId])||{base:0,services:[]};
  const getFee=(cId,m)=>{const e=getEntry(cId,m);return e.base+e.services.reduce((s,sv)=>s+sv.amount,0);};
  const setBase=(cId,m,v)=>setClientFees(prev=>{const e=getEntry(cId,m);return{...prev,[m]:{...prev[m],[cId]:{...e,base:v}}};});
  const addSvc=(cId,m,name,amount)=>setClientFees(prev=>{const e=getEntry(cId,m);return{...prev,[m]:{...prev[m],[cId]:{...e,services:[...e.services,{id:Date.now(),name,amount}]}}};});
  const delSvc=(cId,m,sId)=>setClientFees(prev=>{const e=getEntry(cId,m);return{...prev,[m]:{...prev[m],[cId]:{...e,services:e.services.filter(s=>s.id!==sId)}}};});
  const editSvc=(cId,m,sId,updates)=>setClientFees(prev=>{const e=getEntry(cId,m);return{...prev,[m]:{...prev[m],[cId]:{...e,services:e.services.map(s=>s.id===sId?{...s,...updates}:s)}}};});
  const[expandedClient,setExpandedClient]=useState(null);
  const[editPerson,setEditPerson]=useState(null);
  const[editInvoice,setEditInvoice]=useState(null);
  const[editProject,setEditProject]=useState(null);
  const[preClient,setPreClient]=useState(null);
  /* Cotizador state */
  const[simName,setSimName]=useState("Nuevo Cliente");
  const[simFee,setSimFee]=useState("");
  const[simTeam,setSimTeam]=useState([{id:1,role:"",amount:0}]);
  const[simTransTeam,setSimTransTeam]=useState([]);
  const[simBono,setSimBono]=useState([{id:1,name:"",amount:0}]);
  const[simGastos,setSimGastos]=useState([]);
  const[simMarginTarget,setSimMarginTarget]=useState(30);
  const[simMonth,setSimMonth]=useState(vm);

  /* ── Snapshots por mes (para history correcta) ── */
  const[monthSnapshots,setMonthSnapshots]=useState(saved?.monthSnapshots||{});
  /* Snapshot: guarda equipo y gastos fijos del mes actual para tener history real */
  const takeSnapshot=()=>{
    setMonthSnapshots(prev=>({...prev,[vm]:{
      team:team.map(t=>({id:t.id,name:t.name,regimen:t.regimen,neto:t.neto,inversion:t.inversion||t.bruto,bruto:t.bruto,assignments:t.assignments})),
      fixedExp:fixedExp.map(e=>({...e})),digitalExp:digitalExp.map(e=>({...e})),officeExp:officeExp.map(e=>({...e})),
      savedAt:new Date().toISOString()
    }}));
  };

  /* ── Caja chica from cloud ── */
  const nameFromEmail=(e)=>e?e.split("@")[0].replace(/\./g," ").replace(/\b\w/g,c=>c.toUpperCase()):"";
  const[cajaPersonas,setCajaPersonas]=useState([]);
  const[cajaChica,setCajaChica]=useState([]);
  const[cajaChicaAll,setCajaChicaAll]=useState([]);
  const[cajaAsignaciones,setCajaAsignaciones]=useState([]);
  const[loadingCaja,setLoadingCaja]=useState(false);
  const[newPersonaEmail,setNewPersonaEmail]=useState("");
  const[newPersonaNombre,setNewPersonaNombre]=useState("");
  /* ── Movilidad state ── */
  const[movilidad,setMovilidad]=useState([]);
  const[movilidadAll,setMovilidadAll]=useState([]);
  const[tarifario,setTarifario]=useState([]);
  const[loadingMov,setLoadingMov]=useState(false);
  const[showAddPersona,setShowAddPersona]=useState(false);
  /* ── Roles state ── */
  const[userRoles,setUserRoles]=useState([]);
  const loadRoles=async()=>{const sb=getSB();if(!sb)return;const{data}=await sb.from("user_roles").select("*").eq("activo",true).order("rol").order("nombre");if(data)setUserRoles(data);};
  useEffect(()=>{if(cloudMode)loadRoles();},[cloudMode]);
  const loadCajaChica=async(month)=>{
    const sb=getSB();if(!sb)return;
    setLoadingCaja(true);
    try{
      const[gRes,gAllRes,aRes,pRes]=await Promise.all([
        sb.from("caja_chica").select("*").eq("mes",month).order("fecha",{ascending:false}),
        sb.from("caja_chica").select("*").order("fecha",{ascending:false}),
        sb.from("caja_chica_asignaciones").select("*").order("fecha",{ascending:false}),
        sb.from("caja_chica_personas").select("*").eq("activo",true).order("nombre")
      ]);
      if(!gRes.error&&gRes.data)setCajaChica(gRes.data);
      if(!gAllRes.error&&gAllRes.data)setCajaChicaAll(gAllRes.data);
      if(!aRes.error&&aRes.data)setCajaAsignaciones(aRes.data);
      if(!pRes.error&&pRes.data)setCajaPersonas(pRes.data);
    }catch(e){console.warn("Caja chica load:",e);}
    setLoadingCaja(false);
  };
  const CAJA_PERSONAS_EMAILS=cajaPersonas.map(p=>p.email);
  const handleAddPersona=async()=>{
    if(!newPersonaEmail.trim()){alert("Ingresa un email");return;}
    const sb=getSB();if(!sb)return;
    const nombre=newPersonaNombre.trim()||nameFromEmail(newPersonaEmail.trim());
    const{error}=await sb.from("caja_chica_personas").upsert({email:newPersonaEmail.trim().toLowerCase(),nombre,activo:true,created_by:userEmail},{onConflict:"email"});
    if(error){alert("Error: "+error.message);return;}
    setNewPersonaEmail("");setNewPersonaNombre("");setShowAddPersona(false);loadCajaChica(vm);setSaveMsg("Persona agregada");setTimeout(()=>setSaveMsg(""),3000);
  };
  const handleRemovePersona=async(id,email)=>{
    if(!confirm(`¿Eliminar a ${nameFromEmail(email)} de caja chica?`))return;
    const sb=getSB();if(!sb)return;
    const{error}=await sb.from("caja_chica_personas").update({activo:false}).eq("id",id);
    if(error){alert("Error: "+error.message);return;}
    loadCajaChica(vm);setSaveMsg("Persona eliminada");setTimeout(()=>setSaveMsg(""),3000);
  };
  useEffect(()=>{if(cloudMode)loadCajaChica(vm);},[vm,cloudMode]);
  /* ── Movilidad fetch ── */
  const loadMovilidad=async(month)=>{
    const sb=getSB();if(!sb)return;
    setLoadingMov(true);
    try{
      const[mRes,mAllRes,tRes]=await Promise.all([
        sb.from("movilidad").select("*").eq("mes",month).order("fecha",{ascending:false}),
        sb.from("movilidad").select("*").order("fecha",{ascending:false}),
        sb.from("tarifario_movilidad").select("*").eq("activo",true).order("nombre")
      ]);
      if(!mRes.error&&mRes.data)setMovilidad(mRes.data);
      if(!mAllRes.error&&mAllRes.data)setMovilidadAll(mAllRes.data);
      if(!tRes.error&&tRes.data)setTarifario(tRes.data);
    }catch(e){console.warn("Movilidad load:",e);}
    setLoadingMov(false);
  };
  useEffect(()=>{if(cloudMode)loadMovilidad(vm);},[vm,cloudMode]);
  /* Solo movilidad aprobada cuenta en finanzas */
  const movAprobada=movilidad.filter(v=>v.estado==="aprobado");
  const movAprobadaAll=movilidadAll.filter(v=>v.estado==="aprobado");
  const movPendiente=movilidad.filter(v=>(v.estado||"pendiente")==="pendiente");
  /* Movilidad "Agencia" → va al OH general. Movilidad con marca → costo directo de la marca */
  const movAgencia=movAprobada.filter(v=>v.marca==="Agencia");
  const movMarcas=movAprobada.filter(v=>v.marca!=="Agencia");
  const totalMovAgencia=movAgencia.reduce((s,v)=>s+parseFloat(v.tarifa||0),0);
  const totalMovMarcas=movMarcas.reduce((s,v)=>s+parseFloat(v.tarifa||0),0);
  const totalMovilidad=movAprobada.reduce((s,v)=>s+parseFloat(v.tarifa||0),0);
  const totalMovPendiente=movPendiente.reduce((s,v)=>s+parseFloat(v.tarifa||0),0);
  const totalCajaCloud=cajaChica.filter(g=>(g.tipo||"agencia")==="agencia").reduce((s,g)=>s+parseFloat(g.monto||0),0);
  const totalCajaCliente=cajaChica.filter(g=>g.tipo==="cliente").reduce((s,g)=>s+parseFloat(g.monto||0),0);
  const totalCajaClienteAll=cajaChicaAll.filter(g=>g.tipo==="cliente").reduce((s,g)=>s+parseFloat(g.monto||0),0);
  const cuentasPorCobrar=cajaChicaAll.filter(g=>g.tipo==="cliente"&&g.estado_cobro!=="cobrado");
  const cajaBalances=useMemo(()=>{
    const b={};
    CAJA_PERSONAS_EMAILS.forEach(p=>{
      /* Asignaciones hasta el mes actual (mes<=vm o sin campo mes para datos legacy) */
      const asigHastaMes=cajaAsignaciones.filter(a=>a.persona_email===p&&(!a.mes||a.mes<=vm));
      const asigEsteMes=cajaAsignaciones.filter(a=>a.persona_email===p&&a.mes===vm);
      const asigAnterior=cajaAsignaciones.filter(a=>a.persona_email===p&&(!a.mes||a.mes<vm));
      /* Gastos hasta el mes actual */
      const gastHastaMes=cajaChicaAll.filter(g=>g.user_email===p&&(g.via_pago||"caja_chica")==="caja_chica"&&(!g.mes||g.mes<=vm));
      const gastEsteMes=cajaChicaAll.filter(g=>g.user_email===p&&(g.via_pago||"caja_chica")==="caja_chica"&&g.mes===vm);
      const gastAnterior=cajaChicaAll.filter(g=>g.user_email===p&&(g.via_pago||"caja_chica")==="caja_chica"&&(!g.mes||g.mes<vm));
      const totalAsig=asigHastaMes.reduce((s,a)=>s+parseFloat(a.monto||0),0);
      const totalGast=gastHastaMes.reduce((s,g)=>s+parseFloat(g.monto||0),0);
      const asignadoEsteMes=asigEsteMes.reduce((s,a)=>s+parseFloat(a.monto||0),0);
      const gastadoEsteMes=gastEsteMes.reduce((s,g)=>s+parseFloat(g.monto||0),0);
      const saldoAnterior=asigAnterior.reduce((s,a)=>s+parseFloat(a.monto||0),0)-gastAnterior.reduce((s,g)=>s+parseFloat(g.monto||0),0);
      b[p]={asignado:totalAsig,gastado:totalGast,saldo:totalAsig-totalGast,asignadoEsteMes,gastadoEsteMes,saldoAnterior};
    });
    return b;
  },[cajaChicaAll,cajaAsignaciones,CAJA_PERSONAS_EMAILS,vm]);

  /* ── Load from cloud on first mount ── */
  useEffect(()=>{
    if(!cloudMode){console.log("[INIT] Local mode, skip cloud load");setInitialLoaded(true);return;}
    console.log("[INIT] Cloud mode, loading from Supabase...");
    loadStateCloud().then(cloudData=>{
      console.log("[INIT] Cloud data received:", cloudData?"HAS DATA ("+Object.keys(cloudData).join(",")+")":"NULL");
      if(cloudData&&cloudData.clients){
        console.log("[INIT] Loading",cloudData.clients.length,"clients from cloud");
        setClients(cloudData.clients);
        if(cloudData.teamByMonth){setTeamByMonth(cloudData.teamByMonth);}
        else if(cloudData.team&&cloudData.team.length>0){
          /* Migración: team viejo (array global) → poner en todos los meses para no perder datos */
          const migrated={};ALL_MONTHS.forEach(m=>{migrated[m.value]=cloudData.team.map(t=>({...t,id:t.id||Date.now()+Math.random()}));});
          setTeamByMonth(migrated);
        }
        setInvoices(cloudData.invoices||[]);
        setProjects(cloudData.projects||[]);setFixedExp(cloudData.fixedExp||[]);setDigitalExp(cloudData.digitalExp||[]);
        setVariableExp(cloudData.variableExp||[]);setOfficeExp(cloudData.officeExp||[]);setInvestExp(cloudData.investExp||[]);
        setClientFees(cloudData.clientFees||initFees());setMonthSnapshots(cloudData.monthSnapshots||{});
        if(cloudData.staff)setStaff(cloudData.staff);
        if(cloudData.roles)setRoles(cloudData.roles);
        setSaveMsg("Datos cargados de la nube");setTimeout(()=>setSaveMsg(""),3000);
      }
      setInitialLoaded(true);
    });
  },[]);

  /* ── Auto-save on data change ── */
  useEffect(()=>{
    if(!initialLoaded)return; /* don't save until cloud data is loaded */
    const state={clients,teamByMonth,invoices,projects,fixedExp,digitalExp,variableExp,officeExp,investExp,clientFees,monthSnapshots,staff,roles};
    const timer=setTimeout(()=>{
      saveStateLocal(state); /* always save locally as backup */
      if(cloudMode){
        saveStateCloud(state,userEmail).then(ok=>{
          setSaveMsg(ok?"Guardado en la nube":"Guardado local (nube falló)");
          setTimeout(()=>setSaveMsg(""),4000);
        });
      }else{
        setSaveMsg("Guardado");setTimeout(()=>setSaveMsg(""),2000);
      }
    },1500);
    return()=>clearTimeout(timer);
  },[clients,teamByMonth,invoices,projects,fixedExp,digitalExp,variableExp,officeExp,investExp,clientFees,monthSnapshots,staff,roles,initialLoaded]);

  const NAV=[
    {section:"Ingresos"},
    {id:"recurrentes",label:"Recurrentes (Fees)",icon:"repeat"},
    {id:"proyectos",label:"Proyectos",icon:"briefcase"},
    {section:"Egresos"},
    {id:"planilla",label:"Planilla / RH",icon:"users"},
    {id:"gastos",label:"Gastos",icon:"down"},
    {section:"Control"},
    {id:"facturas",label:"Facturas",icon:"receipt"},
    {section:"Simulación"},
    {id:"cotizador",label:"Cotizador",icon:"calculator"},
    {section:"Reportes"},
    {id:"comercial",label:"Comercial",icon:"barchart"},
    {id:"rentabilidad",label:"Rentabilidad x Cliente",icon:"pie"},
    {id:"cashflow",label:"Cashflow",icon:"dollar"},
    {id:"alertas",label:"Alertas",icon:"alert"},
    {section:""},
    {id:"config",label:"Configuración",icon:"gear"},
  ];

  /* ── calculations ── */
  const calc=useMemo(()=>{
    const totalFees=clients.reduce((s,c)=>s+getFee(c.id,vm),0);
    const mInv=invoices.filter(i=>i.month===vm);
    /* Excluir paid media de métricas de ingreso real */
    const realInv=invoices.filter(i=>i.type!=="paid");
    const paidInv=invoices.filter(i=>i.type==="paid");
    const allCob=realInv.filter(i=>i.status==="Cobrada");
    const allPC=realInv.filter(i=>i.status==="Por cobrar");
    const allEm=realInv.filter(i=>i.status==="Emitida");
    const totalCob=allCob.reduce((s,i)=>s+i.amount,0);
    const totalPC=allPC.reduce((s,i)=>s+i.amount,0);
    const totalEm=allEm.reduce((s,i)=>s+i.amount,0);
    /* Paid media totals (pass-through) */
    const paidPC=paidInv.filter(i=>i.status!=="Cobrada");
    const paidCob=paidInv.filter(i=>i.status==="Cobrada");
    const totalPaidPC=paidPC.reduce((s,i)=>s+i.amount,0);
    const totalPaidCob=paidCob.reduce((s,i)=>s+i.amount,0);
    const mCob=mInv.filter(i=>i.status==="Cobrada"&&i.type!=="paid");
    const mPC=mInv.filter(i=>i.status==="Por cobrar"&&i.type!=="paid");
    const mEm=mInv.filter(i=>i.status==="Emitida");
    const mProj=projects.filter(p=>p.month===vm);
    const totalPR=mProj.reduce((s,p)=>s+p.revenue,0);
    const totalPCost=mProj.reduce((s,p)=>s+pCost(p),0);
    const dedPay=team.reduce((s,t)=>s+tAllDed(t),0);
    const transPay=team.reduce((s,t)=>s+tTrans(t),0);
    const tLiquidaciones=team.reduce((s,t)=>s+(t.liquidacion||0),0);
    const totalPay=dedPay+transPay+tLiquidaciones;
    const tFixed=fixedExp.reduce((s,e)=>s+e.amount,0);
    const tDigital=digitalExp.reduce((s,e)=>s+e.amount,0);
    const tVar=variableExp.filter(e=>e.month===vm).reduce((s,e)=>s+e.amount,0);
    const tOffice=officeExp.reduce((s,e)=>s+e.amount,0);
    const tInvest=investExp.filter(e=>e.month===vm).reduce((s,e)=>s+e.amount,0);
    const tCajaCloud=totalCajaCloud||0;
    const tMovAgencia=totalMovAgencia||0; /* Movilidad "Agencia" → OH */
    const tMovMarcas=totalMovMarcas||0; /* Movilidad por marca → costo directo */
    const overhead=transPay+tLiquidaciones+tFixed+tDigital+tVar+tCajaCloud+tOffice+tMovAgencia;
    const structExp=totalPay+tFixed+tDigital+tVar+tCajaCloud+tOffice+tInvest+tMovAgencia+tMovMarcas;
    const structProfit=totalFees-structExp;
    const projProfit=totalPR-totalPCost;
    const netProfit=structProfit+projProfit;
    const totalIncome=totalFees+totalPR;
    const totalExpenses=structExp; /* Project costs are isolated — they don't impact general flow */
    const clientProfit=clients.map(c=>{
      const cFee=getFee(c.id,vm);
      const cTeam=team.reduce((s,t)=>s+tDed(t,c.id),0);
      /* Gastos operativos de caja chica tipo agencia para esta marca */
      const cGastosOp=cajaChica.filter(g=>(g.tipo||"agencia")==="agencia"&&g.marca===c.name).reduce((s,g)=>s+parseFloat(g.monto||0),0);
      /* Movilidad (gasolina) aprobada asignada a esta marca (excluye "Agencia" que va a OH) */
      const cMovilidad=movMarcas.filter(v=>v.marca===c.name).reduce((s,v)=>s+parseFloat(v.tarifa||0),0);
      const cOH=totalFees>0?(cFee/totalFees)*overhead:0;
      const cNet=cFee-cTeam-cGastosOp-cMovilidad-cOH;
      const cMargin=cFee>0?(cNet/cFee)*100:0; /* Margen incluye OH proporcional */
      const cP=mProj.filter(p=>p.clientId===c.id);
      const cPR=cP.reduce((s,p)=>s+p.revenue,0);const cPC=cP.reduce((s,p)=>s+pCost(p),0);
      const cInv=invoices.filter(i=>i.clientId===c.id);
      return{...c,fee:cFee,teamCost:cTeam,gastosOp:cGastosOp,movilidad:cMovilidad,oh:cOH,structNet:cNet,margin:cMargin,projRev:cPR,projCost:cPC,projProfit:cPR-cPC,
        utilFee:cNet,utilProy:cPR-cPC,totalNet:cNet+(cPR-cPC),
        teamMembers:team.filter(t=>t.assignments.some(a=>a.clientId===c.id)),projects:cP,
        cobrado:cInv.filter(i=>i.status==="Cobrada").reduce((s,i)=>s+i.amount,0),
        porCobrar:cInv.filter(i=>i.status==="Por cobrar").reduce((s,i)=>s+i.amount,0)};
    });
    return{totalFees,totalCob,totalPC,totalEm,allCob,allPC,allEm,mInv,mCob,mPC,mEm,totalPR,totalPCost,dedPay,transPay,totalPay,tLiquidaciones,
      tFixed,tDigital,tVar,tCajaCloud,tMovAgencia,tMovMarcas,tOffice,tInvest,overhead,structExp,structProfit,projProfit,netProfit,totalIncome,totalExpenses,clientProfit,
      totalPaidPC,totalPaidCob,paidPC,paidCob};
  },[clients,teamByMonth,invoices,projects,fixedExp,digitalExp,variableExp,officeExp,investExp,vm,clientFees,totalCajaCloud,totalMovAgencia,totalMovMarcas,cajaChica,movMarcas]);

  const history=useMemo(()=>{
    return MONTHS.map(({value:m,label})=>{
      const fees=clients.reduce((s,c)=>s+getFee(c.id,m),0);
      const pR=projects.filter(p=>p.month===m).reduce((s,p)=>s+p.revenue,0);
      const pC=projects.filter(p=>p.month===m).reduce((s,p)=>s+pCost(p),0);
      /* Usar snapshot del mes si existe, sino teamByMonth del mes */
      const snap=monthSnapshots[m];
      const mTeam=teamByMonth[m]||[];
      const pay=snap?snap.team.reduce((s,t)=>s+(t.inversion||t.bruto||0),0):mTeam.reduce((s,t)=>s+(t.inversion||t.bruto),0);
      const fx=snap?snap.fixedExp.reduce((s,e)=>s+e.amount,0):fixedExp.reduce((s,e)=>s+e.amount,0);
      const dg=snap?snap.digitalExp.reduce((s,e)=>s+e.amount,0):digitalExp.reduce((s,e)=>s+e.amount,0);
      const vr=variableExp.filter(e=>e.month===m).reduce((s,e)=>s+e.amount,0);
      const of_=snap?snap.officeExp.reduce((s,e)=>s+e.amount,0):officeExp.reduce((s,e)=>s+e.amount,0);
      const iv=investExp.filter(e=>e.month===m).reduce((s,e)=>s+e.amount,0);
      const mv=movAprobadaAll.filter(v=>v.mes===m).reduce((s,v)=>s+parseFloat(v.tarifa||0),0); /* total movilidad for structExp */
      const sExp=pay+fx+dg+vr+of_+iv+mv;
      const hasData=invoices.some(i=>i.month===m)||projects.some(p=>p.month===m)||vr>0||iv>0||fees>0||mv>0;
      return{month:label.split(" ")[0],m:m,fees,sExp,sProfit:fees-sExp,pProfit:pR-pC,total:(fees-sExp)+(pR-pC),income:fees+pR,pCost:pC,hasData,snapped:!!snap};
    });
  },[clients,teamByMonth,projects,fixedExp,digitalExp,variableExp,officeExp,investExp,invoices,clientFees,monthSnapshots,vm,movilidadAll]);

  const filtInv=useMemo(()=>{
    let list=invoices.filter(i=>i.month===vm&&i.type===facturaTab);
    if(statusFilter)list=list.filter(i=>i.status===statusFilter);
    return list.sort((a,b)=>b.date.localeCompare(a.date));
  },[invoices,vm,statusFilter,facturaTab]);

  const pageLabel=NAV.find(n=>n.id===page)?.label||"";
  const go=(p)=>{setPage(p);setSelClient(null);setShowForm(null);};

  return(
    <div className="app">
      <div className="sidebar">
        <div className="sidebar-brand"><Logo width={130} color="#fff"/></div>
        {NAV.map((n,i)=>n.section!==undefined&&!n.id?(
          <div key={i} className="nav-section">{n.section}</div>
        ):(
          <button key={n.id} className={`nav-btn ${page===n.id?"active":""}`} onClick={()=>go(n.id)}>
            <Ic d={ic[n.icon]} size={15} color={page===n.id?"#18181b":"rgba(255,255,255,.35)"}/>{n.label}
          </button>

      </div>

      <div className="main">
        <div className="header">
          <h1>{pageLabel}</h1>
          <div style={{display:"flex",alignItems:"center",gap:16}}>
            {saveMsg&&<span style={{fontSize:11,color:"#fff",fontWeight:600,background:saveMsg.includes("nube")?"#059669":"#18181b",padding:"6px 16px",borderRadius:20,animation:"fadeIn .2s",whiteSpace:"nowrap"}}>{saveMsg.includes("nube")?"☁️ ":""}{saveMsg}</span>}
            <button className="btn btn-sm btn-gray" title="Cerrar mes: guarda snapshot de planilla y gastos actuales para este mes" onClick={()=>{takeSnapshot();setSaveMsg("Mes cerrado ✓");setTimeout(()=>setSaveMsg(""),3000);}}>Cerrar {ML[parseInt(vm.split("-")[1])-1]}</button>
            <div style={{display:"flex",alignItems:"center",gap:4,background:"#f4f4f5",borderRadius:10,padding:3}}>
              {YEARS.map(y=>(
                <button key={y} onClick={()=>setVm(`${y}-${vm.split("-")[1]}`)} style={{padding:"5px 14px",borderRadius:8,border:"none",fontSize:12,fontWeight:selYear===y?700:500,cursor:"pointer",fontFamily:"inherit",background:selYear===y?"#18181b":"transparent",color:selYear===y?"#fff":"#71717a",transition:"all .15s"}}>{y}</button>
              ))}
            </div>
            <select className="msel" value={vm} onChange={e=>setVm(e.target.value)}>
              {yearMonths.map(m=><option key={m.value} value={m.value}>{ML[parseInt(m.value.split("-")[1])-1]}</option>)}

            <div className="user-bar">

              <strong style={{maxWidth:120,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{userEmail==="local"?"Ynes Martínez":userEmail}</strong>
              {cloudMode&&<button onClick={onLogout} style={{background:"#18181b",border:"none",cursor:"pointer",color:"#fff",fontSize:11,fontFamily:"inherit",padding:"6px 14px",borderRadius:20,fontWeight:600}}>Cerrar sesión</button>}
            </div>
          </div>
        </div>

        <div className="content"><div className="ci">

        {/* ═══ INGRESOS > RECURRENTES ═══ */}
        {page==="recurrentes"&&(()=>{
          const activos=clients.filter(c=>getFee(c.id,vm)>0);
          const inactivos=clients.filter(c=>getFee(c.id,vm)===0);
          const activar=(cId)=>{const pi=MONTHS.findIndex(m=>m.value===vm)-1;const prevM=pi>=0?MONTHS[pi].value:null;
            const prevE=prevM?getEntry(cId,prevM):null;const base=prevE&&prevE.base>0?prevE.base:(clients.find(x=>x.id===cId)?.fee||0);
            setClientFees(prev=>({...prev,[vm]:{...prev[vm],[cId]:{base,services:prevE?prevE.services.map(s=>({...s,id:Date.now()+Math.random()})):[]}}}));};
          const desactivar=(cId)=>setClientFees(prev=>({...prev,[vm]:{...prev[vm],[cId]:{base:0,services:[]}}}));
          /* Detectar si el mes actual tiene datos configurados */
          const mesData=clientFees[vm]||{};
          const mesTieneDatos=Object.values(mesData).some(e=>e&&e.base>0);
          const prevMonthIdx=MONTHS.findIndex(m=>m.value===vm)-1;
          const prevMonth=prevMonthIdx>=0?MONTHS[prevMonthIdx]:null;
          const prevTieneDatos=prevMonth?Object.values(clientFees[prevMonth.value]||{}).some(e=>e&&e.base>0):false;
          const copiarDelMesAnterior=()=>{if(!prevMonth)return;
            if(mesTieneDatos&&!confirm("Este mes ya tiene datos. ¿Sobrescribir con los datos de "+prevMonth.label+"?"))return;

              nf[vm][c.id]={base:pe.base,services:pe.services.map(s=>({...s,id:Date.now()+Math.random()}))};});return nf;});};

              <div style={{fontSize:13,color:"rgba(255,255,255,.5)",marginBottom:12}}>Pre-llena los fees de <strong style={{color:"#fff"}}>{ML[parseInt(vm.split("-")[1])-1]}</strong> copiando los datos de <strong style={{color:"#fff"}}>{prevMonth.label}</strong>.</div>
              <button className="btn" style={{fontSize:14,padding:"12px 24px",background:"#fff",color:"#18181b",fontWeight:700,borderRadius:12}} onClick={copiarDelMesAnterior}>

          {showForm==="newclient"&&<div className="form-card" style={{marginBottom:12}}><h4 style={{color:"#18181b"}}>Agregar Cliente</h4>
            <form onSubmit={e=>{e.preventDefault();const f=new FormData(e.target);const nm=(f.get("n")||"").trim();const fee=parseInt(f.get("f"))||0;

              const nid=Date.now();setClients(p=>[...p,{id:nid,name:nm,fee}]);
                setClientFees(prev=>{const nf={...prev};ALL_MONTHS.forEach(({value:m})=>{
                  const mIdx=ALL_MONTHS.findIndex(x=>x.value===m);const vmIdx=ALL_MONTHS.findIndex(x=>x.value===vm);
                  nf[m]={...nf[m],[nid]:{base:mIdx>=vmIdx?fee:0,services:[]}};
                });return nf;});
                setShowForm(null);
            }}>
              <div className="form-row">
                <input name="n" placeholder="Nombre del cliente" required style={{flex:2}}/>
                <input name="f" type="number" placeholder="Fee mensual (S/ 0 si no tiene)" style={{flex:1}}/>
                <button type="submit" className="btn btn-green">Agregar</button>
                <button type="button" className="btn btn-gray" onClick={()=>setShowForm(null)}>Cancelar</button>
              </div>
              <div style={{fontSize:11,color:"#a1a1aa",marginTop:4}}>Se activará desde {ML[parseInt(vm.split("-")[1])-1]} en adelante</div>
            </form>
          </div>}

          {activos.map(c=>{
            const entry=getEntry(c.id,vm);const cFee=getFee(c.id,vm);const isExp=expandedClient===c.id;
            return(<div key={c.id} className="card" style={{marginBottom:8,borderLeft:"3px solid #2563eb"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",cursor:"pointer"}} onClick={()=>setExpandedClient(isExp?null:c.id)}>
                <div style={{display:"flex",alignItems:"center",gap:10}}>
                  <span style={{fontSize:16,color:"#a1a1aa"}}>{isExp?"▾":"▸"}</span>
                  <span style={{fontWeight:600}}>{c.name}</span>
                  {entry.services.length>0&&<span className="badge bb" style={{fontSize:10}}>{entry.services.length} servicio{entry.services.length>1?"s":""}</span>}
                </div>
                <div style={{display:"flex",alignItems:"center",gap:16}}>
                  <span style={{fontSize:12,color:"#a1a1aa"}}>{pct(cFee,calc.totalFees)}%</span>
                  <span style={{fontWeight:700,fontSize:16}} className="tg">{fmt(cFee)}</span>
                </div>
              </div>
              {isExp&&(<div style={{marginTop:12,borderTop:"1px solid #f4f4f5",paddingTop:12}}>
                <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10}}>
                  <span style={{fontSize:12,fontWeight:600,color:"#71717a",minWidth:80}}>Nombre</span>
                  <input value={c.name} onChange={e=>setClients(clients.map(x=>x.id===c.id?{...x,name:e.target.value}:x))}
                    style={{flex:1,fontWeight:600,fontSize:13,padding:"5px 8px"}}/>
                </div>
                <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10}}>

                  <input type="number" value={sv.amount} onChange={e=>editSvc(c.id,vm,sv.id,{amount:parseInt(e.target.value)||0})} style={{width:90,fontWeight:600,fontSize:12,textAlign:"right",padding:"3px 6px",border:"1px solid transparent",borderRadius:4,background:"transparent"}} onFocus={e=>{e.target.style.border="1px solid #d4d4d8";e.target.style.background="#fff";}} onBlur={e=>{e.target.style.border="1px solid transparent";e.target.style.background="transparent";}}/>

                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginTop:10,paddingTop:10,borderTop:"1px solid #f4f4f5"}}>
                  <div style={{display:"flex",gap:6}}>
                  <button className="btn btn-sm btn-red" style={{opacity:.7}} onClick={e=>{e.stopPropagation();if(confirm("¿Desactivar "+c.name+" en "+ML[parseInt(vm.split("-")[1])-1]+"?"))desactivar(c.id);}}>Desactivar este mes</button>
                  <button className="btn btn-sm" style={{background:"#fef2f2",color:"#dc2626",fontSize:11,padding:"3px 8px",borderRadius:6}} onClick={e=>{e.stopPropagation();if(confirm("¿Eliminar "+c.name+" de toda la base de datos? Esta acción no se puede deshacer.")){setClients(clients.filter(x=>x.id!==c.id));setExpandedClient(null);}}}>Eliminar cliente</button>
                </div>
                  <div><span style={{fontSize:11,color:"#a1a1aa"}}>Base {fmt(entry.base)} + Servicios {fmt(entry.services.reduce((s,sv)=>s+sv.amount,0))} = </span>
                  <span style={{fontWeight:700}} className="tg">{fmt(cFee)}</span></div>
                </div>
              </div>)}
            </div>);
          })}

          {inactivos.length>0&&(<>
            <div className="sl" style={{marginTop:16,color:"#a1a1aa"}}>Clientes inactivos este mes ({inactivos.length})</div>
            {inactivos.map(c=>(<div key={c.id} className="card" style={{marginBottom:6,borderLeft:"4px solid #e4e4e7",opacity:.6}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <div style={{display:"flex",alignItems:"center",gap:10}}>
                  <span style={{fontWeight:600,color:"#a1a1aa"}}>{c.name}</span>
                  <span className="badge br" style={{fontSize:10}}>Inactivo</span>
                </div>
                <button className="btn btn-sm btn-green" onClick={()=>activar(c.id)}>Activar en {ML[parseInt(vm.split("-")[1])-1]}</button>
              </div>
            </div>))}
          </>)}

          <div className="total-bar" style={{marginTop:12}}>
            <div><div style={{fontSize:11,color:"#71717a",textTransform:"uppercase"}}>Total Ingresos Recurrentes — {ML[parseInt(vm.split("-")[1])-1]}</div>
              <div style={{fontSize:24,fontWeight:700}} className="tg">{fmt(calc.totalFees)}</div></div>
            <div style={{textAlign:"right"}}><div style={{fontSize:11,color:"#71717a"}}>Clientes activos</div>
              <div style={{fontSize:18,fontWeight:700}}>{activos.length} / {clients.length}</div></div>
          </div>
          {prevMonth&&<div style={{marginTop:12,display:"flex",gap:8}}>
            <button className="btn btn-gray" onClick={copiarDelMesAnterior}><Ic d={ic.repeat} size={13} color="#71717a"/> {mesTieneDatos?"Sobrescribir":"Pre-llenar"} desde {prevMonth.label}</button>
          </div>}
        </>);})()}

        {/* ═══ INGRESOS > PROYECTOS ═══ */}
        {page==="proyectos"&&(<>
          <div className="info-box">Proyectos independientes con ingreso y costo directo. <strong>NO</strong> entran en la estructura mensual ni overhead.</div>
          <div className="grid g3" style={{marginBottom:16}}>
            <div className="card"><div className="kpi-label">Ingreso (mes)</div><div className="kpi-value tg">{fmt(calc.totalPR)}</div></div>
            <div className="card"><div className="kpi-label">Costo (mes)</div><div className="kpi-value tr">{fmt(calc.totalPCost)}</div></div>
            <div className="card"><div className="kpi-label">Utilidad (mes)</div><div className={`kpi-value ${calc.projProfit>=0?"tg":"tr"}`}>{fmt(calc.projProfit)}</div></div>
          </div>
          <div style={{textAlign:"right",marginBottom:12}}>
            <button className="btn btn-blue" onClick={()=>setShowForm("project")}><Ic d={ic.plus} size={14} color="#fff"/> Nuevo Proyecto</button>
          </div>
          {showForm==="project"&&<ProjectForm clients={clients} month={vm} onAdd={p=>{setProjects(prev=>[...prev,{...p,id:Date.now()}]);setShowForm(null);}} onClose={()=>setShowForm(null)}/>}
          {editProject&&<div className="form-card" style={{background:"#f4f4f5",borderColor:"#f0f0f0",marginBottom:12}}>
            <h4 style={{color:"#18181b"}}>Editar Proyecto</h4>
            <form onSubmit={e=>{e.preventDefault();setProjects(prev=>prev.map(p=>p.id===editProject.id?editProject:p));setEditProject(null);}}>
              <div className="form-row"><select value={editProject.clientId} onChange={e=>setEditProject({...editProject,clientId:parseInt(e.target.value)})}>{clients.map(c=><option key={c.id} value={c.id}>{c.name}</option>)}</select>
                <input value={editProject.name} onChange={e=>setEditProject({...editProject,name:e.target.value})} placeholder="Nombre" required/></div>
              <div className="form-row"><input type="number" value={editProject.revenue} onChange={e=>setEditProject({...editProject,revenue:parseInt(e.target.value)||0})} placeholder="Ingreso (S/)"/>
                <select value={editProject.status} onChange={e=>setEditProject({...editProject,status:e.target.value})}><option>Pendiente</option><option>En curso</option><option>Completado</option></select>
                <select value={editProject.month} onChange={e=>setEditProject({...editProject,month:e.target.value})}>{ALL_MONTHS.map(m=><option key={m.value} value={m.value}>{m.label}</option>)}</select></div>
              <div style={{display:"flex",gap:6}}><button type="submit" className="btn btn-blue">Guardar</button><button type="button" className="btn btn-gray" onClick={()=>setEditProject(null)}>Cancelar</button></div>
            </form>
          </div>}
          {projects.sort((a,b)=>b.month.localeCompare(a.month)).map(p=>{const pc=pCost(p);const ut=p.revenue-pc;const mg=p.revenue>0?(ut/p.revenue)*100:0;const isExp=expandedClient===("proj-"+p.id);
            return(<div key={p.id} className="card" style={{marginBottom:8,borderLeft:`4px solid ${p.status==="Completado"?"#2563eb":p.status==="En curso"?"#52525b":"#71717a"}`}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",cursor:"pointer"}} onClick={()=>setExpandedClient(isExp?null:"proj-"+p.id)}>
                <div style={{display:"flex",alignItems:"center",gap:10}}>
                  <span style={{fontSize:14,color:"#a1a1aa"}}>{isExp?"▾":"▸"}</span>
                  <span style={{fontWeight:600}}>{p.name}</span>
                  <span style={{fontSize:11,color:"#a1a1aa"}}>{clients.find(c=>c.id===p.clientId)?.name}</span>
                  <span className={`badge ${p.status==="Completado"?"bg":p.status==="En curso"?"bb":"ba"}`} style={{fontSize:10}}>{p.status}</span>
                  <span style={{fontSize:11,color:"#a1a1aa"}}>{p.month}</span>
                </div>
                <div style={{display:"flex",alignItems:"center",gap:12}}>
                  <span className="tg" style={{fontWeight:700}}>{fmt(p.revenue)}</span>

                      <td><span className="badge" style={{background:"#2563eb",color:"#fff"}}>{g.marca}</span></td>
                      <td>{g.concepto}</td><td className="text-right">{fmt(g.monto)}</td>
                      <td className="text-right" style={{color:"#22c55e",fontWeight:600}}>{fmt(g.monto*1.18)}</td></tr>
                  ))}</tbody></table>
                </div>
              </>}
              {!cloudMode&&<div className="info-box" style={{marginTop:12}}>Conecta Supabase para ver préstamos.</div>}
            </div>);
          })()}
          {gastoTab==="oficina"&&<ExpBlock title="Gastos de Oficina" items={officeExp} total={calc.tOffice} color="" onAdd={e=>setOfficeExp(p=>[...p,{...e,id:Date.now()}])} onDel={id=>setOfficeExp(officeExp.filter(e=>e.id!==id))}/>}
          {gastoTab==="inversion"&&<ExpBlock title={`Inversión (${vm})`} items={investExp.filter(e=>e.month===vm)} total={calc.tInvest} color="tb" onAdd={e=>setInvestExp(p=>[...p,{...e,id:Date.now(),month:vm}])} onDel={id=>setInvestExp(investExp.filter(e=>e.id!==id))}/>}
          {/* Project costs moved to Proyectos page — they don't affect general flow */}
        </>)}

        {/* ═══ CONTROL > FACTURAS ═══ */}
        {page==="facturas"&&(()=>{
          const tabInv=invoices.filter(i=>i.type===facturaTab);
          const tabMInv=tabInv.filter(i=>i.month===vm);
          const tabCob=tabMInv.filter(i=>i.status==="Cobrada");
          const tabPC=tabMInv.filter(i=>i.status==="Por cobrar");
          const tabEm=tabMInv.filter(i=>i.status==="Emitida");
          const tabAllPC=tabInv.filter(i=>i.status==="Por cobrar");
          const tabAllEm=tabInv.filter(i=>i.status==="Emitida");
          const FTABS=[{id:"recurrente",label:"Recurrentes",desc:"Fees mensuales de clientes"},{id:"no_recurrente",label:"No Recurrentes",desc:"Proyectos y servicios puntuales"},{id:"paid",label:"Paid Media",desc:"Facturas de pauta digital"}];
          return(<>
          <div className="info-box">Control de facturación y cobranza. Tres tipos: recurrentes (fees), no recurrentes (proyectos) y paid media (pauta).</div>
          {/* Tabs */}
          <div style={{display:"flex",gap:4,marginBottom:16}}>
            {FTABS.map(t=><button key={t.id} className={`btn ${facturaTab===t.id?"btn-green":"btn-gray"}`} onClick={()=>{setFacturaTab(t.id);setStatusFilter("");}} style={{flex:1,fontSize:12,padding:"8px 12px"}}>
              <div style={{fontWeight:600}}>{t.label}</div>
              <div style={{fontSize:10,opacity:.7,marginTop:2}}>{t.desc}</div>
            </button>)}
          </div>
          {/* KPIs del tab actual */}
          <div className="grid g4" style={{marginBottom:16}}>
            <div className="card"><div className="kpi-label">Total (mes)</div><div className="kpi-value">{tabMInv.length}</div><div className="kpi-sub">{fmt(tabMInv.reduce((s,i)=>s+i.amount,0))}</div></div>
            <div className="card" style={{borderColor:"#f0f0f0"}}><div className="kpi-label">Emitidas (mes)</div><div className="kpi-value" style={{color:"#3f3f46"}}>{tabEm.length}</div><div className="kpi-sub">{fmt(tabEm.reduce((s,i)=>s+i.amount,0))}</div></div>
            <div className="card" style={{borderColor:"#d4d4d8"}}><div className="kpi-label">Por Cobrar (mes)</div><div className="kpi-value ta">{tabPC.length}</div><div className="kpi-sub">{fmt(tabPC.reduce((s,i)=>s+i.amount,0))}</div></div>
            <div className="card" style={{borderColor:"#f0f0f0"}}><div className="kpi-label">Cobradas (mes)</div><div className="kpi-value tg">{tabCob.length}</div><div className="kpi-sub">{fmt(tabCob.reduce((s,i)=>s+i.amount,0))}</div></div>
          </div>
          {/* Resumen general pendiente */}
          <div className="grid g2" style={{marginBottom:16}}>
            <div className="card" style={{borderLeft:"4px solid #3f3f46"}}><div className="kpi-label">Emitidas (total acum.)</div><div className="kpi-value" style={{color:"#3f3f46"}}>{tabAllEm.length}</div><div className="kpi-sub">{fmt(tabAllEm.reduce((s,i)=>s+i.amount,0))}</div></div>
            <div className="card" style={{borderLeft:"4px solid #71717a"}}><div className="kpi-label">Por Cobrar (total acum.)</div><div className="kpi-value ta">{tabAllPC.length}</div><div className="kpi-sub">{fmt(tabAllPC.reduce((s,i)=>s+i.amount,0))}</div></div>
          </div>
          {/* Filtro + botón */}
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
            <select value={statusFilter} onChange={e=>setStatusFilter(e.target.value)} style={{minWidth:160}}>
              <option value="">Todas</option><option>Emitida</option><option>Por cobrar</option><option>Cobrada</option>
            </select>
            <button className="btn btn-green" onClick={()=>setShowForm("invoice")}><Ic d={ic.plus} size={14} color="#fff"/> Nueva Factura</button>
          </div>
          {showForm==="invoice"&&<InvoiceForm clients={clients} month={vm} type={facturaTab} onAdd={inv=>{setInvoices(p=>[...p,{...inv,id:Date.now()}]);setShowForm(null);}} onClose={()=>setShowForm(null)}/>}
          <div className="card" style={{padding:0,overflow:"hidden"}}>
            <table>
              <thead><tr><th>Factura</th><th>Fecha</th><th>Cliente</th><th>Concepto</th><th className="text-right">Monto</th><th className="text-center">Estado</th><th></th></tr></thead>
              <tbody>
                {filtInv.map(inv=>{
                  const stColor=inv.status==="Cobrada"?"bg":inv.status==="Por cobrar"?"ba":"bb";
                  const isEditing=editInvoice===inv.id;
                  if(isEditing){
                    return(<tr key={inv.id} style={{background:"#f4f4f5"}}>
                      <td><input value={inv.number} onChange={e=>setInvoices(invoices.map(i=>i.id===inv.id?{...i,number:e.target.value}:i))} style={{width:100,fontSize:12,padding:"4px 6px"}}/></td>
                      <td><input type="date" value={inv.date} onChange={e=>setInvoices(invoices.map(i=>i.id===inv.id?{...i,date:e.target.value}:i))} style={{fontSize:11,padding:"4px 6px"}}/></td>
                      <td><select value={inv.clientId} onChange={e=>setInvoices(invoices.map(i=>i.id===inv.id?{...i,clientId:parseInt(e.target.value)}:i))} style={{fontSize:12,padding:"4px 6px"}}>{clients.map(c=><option key={c.id} value={c.id}>{c.name}</option>)}</select></td>
                      <td><input value={inv.concept} onChange={e=>setInvoices(invoices.map(i=>i.id===inv.id?{...i,concept:e.target.value}:i))} style={{width:"100%",fontSize:12,padding:"4px 6px"}}/></td>
                      <td><input type="number" value={inv.amount} onChange={e=>setInvoices(invoices.map(i=>i.id===inv.id?{...i,amount:parseInt(e.target.value)||0}:i))} style={{width:90,fontSize:12,padding:"4px 6px",textAlign:"right"}}/></td>
                      <td className="text-center"><select value={inv.status} onChange={e=>setInvoices(invoices.map(i=>i.id===inv.id?{...i,status:e.target.value}:i))} style={{fontSize:11,padding:"4px 6px"}}><option>Emitida</option><option>Por cobrar</option><option>Cobrada</option></select></td>
                      <td className="text-center" style={{whiteSpace:"nowrap"}}>
                        <button className="btn btn-sm btn-green" onClick={()=>setEditInvoice(null)} style={{fontSize:10,padding:"3px 8px"}}>OK</button>
                        <button className="del-btn" style={{marginLeft:4}} onClick={()=>{if(confirm("¿Eliminar factura "+inv.number+"?"))setInvoices(invoices.filter(i=>i.id!==inv.id));setEditInvoice(null);}}>✕</button>
                      </td>
                    </tr>);
                  }
                  return(<tr key={inv.id}>
                  <td style={{fontWeight:600}}>{inv.number}</td><td style={{color:"#a1a1aa",fontSize:12}}>{inv.date}</td>
                  <td>{clients.find(c=>c.id===inv.clientId)?.name||"—"}</td><td>{inv.concept}</td>
                  <td className="text-right font-bold tg">{fmt(inv.amount)}</td>
                  <td className="text-center"><select value={inv.status} onChange={e=>setInvoices(invoices.map(i=>i.id===inv.id?{...i,status:e.target.value}:i))} style={{fontSize:11,padding:"4px 6px",borderRadius:6}}><option>Emitida</option><option>Por cobrar</option><option>Cobrada</option></select></td>
                  <td className="text-center" style={{whiteSpace:"nowrap"}}>
                    <button className="btn btn-sm btn-gray" style={{fontSize:10,padding:"3px 6px"}} onClick={()=>setEditInvoice(inv.id)} title="Editar factura">✎</button>
                  </td>
                </tr>);})}
                {filtInv.length===0&&<tr><td colSpan={7} className="text-center" style={{color:"#a1a1aa",padding:24}}>No hay facturas en esta categoría.</td></tr>}
              </tbody>
            </table>
          </div>
        </>);})()}

        {/* ═══ SIMULACIÓN > COTIZADOR ═══ */}
        {page==="cotizador"&&(()=>{
          /* Current real numbers — based on simMonth (independent of global vm) */
          const curTotalFees=clients.reduce((s,c)=>s+getFee(c.id,simMonth),0);
          const curTransPay=team.reduce((s,t)=>s+tTrans(t),0);
          const curFixed=fixedExp.reduce((s,e)=>s+e.amount,0);
          const curDigital=digitalExp.reduce((s,e)=>s+e.amount,0);
          const curVar=variableExp.filter(e=>e.month===simMonth).reduce((s,e)=>s+e.amount,0);
          const curOffice=officeExp.reduce((s,e)=>s+e.amount,0);
          const curOverhead=curTransPay+curFixed+curDigital+curVar+curOffice;
          const curClientProfit=clients.map(c=>{const f=getFee(c.id,simMonth);const tc=team.reduce((s,t)=>s+tDed(t,c.id),0);return{...c,fee:f,teamCost:tc};}).filter(c=>c.fee>0);

          /* Sim calculations */
          const simDedCost=simTeam.reduce((s,t)=>s+(t.amount||0),0);
          const simTransCost=simTransTeam.reduce((s,t)=>s+(t.amount||0),0);
          const simBonoCost=simBono.reduce((s,b)=>s+b.amount,0);
          const simDirectGastos=simGastos.filter(g=>g.tipo==="directo").reduce((s,g)=>s+(g.amount||0),0);
          const simOHGastos=simGastos.filter(g=>g.tipo==="overhead").reduce((s,g)=>s+(g.amount||0),0);
          const simDirectTotal=simDedCost+simBonoCost+simDirectGastos; /* costos que se cargan directo al cliente */
          const simFeeVal=parseInt(simFee)||0;

          /* New totals WITH new client — transversal + gastos OH suben overhead; gastos fijos/oficina no cambian */
          const newTotalFees=curTotalFees+simFeeVal;
          const newOverhead=curOverhead+simTransCost+simOHGastos;
          const newTotalTrans=curTransPay+simTransCost;

          /* New client's numbers */
          const newClientOH=newTotalFees>0?(simFeeVal/newTotalFees)*newOverhead:0;
          const newClientUtil=simFeeVal-simDirectTotal-newClientOH;
          const newClientMargin=simFeeVal>0?(newClientUtil/simFeeVal)*100:0;

          /* Fee mínimo (margen 0%): fee = directTotal + (fee/(curFees+fee))*newOH → quadratic */
          const D=simDirectTotal;
          const a_=1;const b_=curTotalFees-newOverhead-D;const c_=-D*curTotalFees;
          const disc=b_*b_-4*a_*c_;
          const feeMinimo=disc>=0?Math.ceil((-b_+Math.sqrt(disc))/(2*a_)):D;

          /* Fee sugerido for target margin */
          const m_=simMarginTarget/100;
          const a2=1-m_;const b2=(1-m_)*curTotalFees-D-newOverhead;const c2=-D*curTotalFees;
          const disc2=b2*b2-4*a2*c2;
          const feeSugerido=disc2>=0&&a2!==0?Math.ceil((-b2+Math.sqrt(disc2))/(2*a2)):Math.ceil(D/(1-m_));

          /* Impact on existing clients */
          const impactData=curClientProfit.map(c=>{
            const curOH=curTotalFees>0?(c.fee/curTotalFees)*curOverhead:0;
            const curUtil=c.fee-c.teamCost-curOH;
            const curMg=c.fee>0?(curUtil/c.fee)*100:0;
            const newOH=newTotalFees>0?(c.fee/newTotalFees)*newOverhead:0;
            const newUtil=c.fee-c.teamCost-newOH;
            const newMg=c.fee>0?(newUtil/c.fee)*100:0;
            return{name:c.name,fee:c.fee,teamCost:c.teamCost,curOH,curUtil,curMg,newOH,newUtil,newMg,deltaUtil:newUtil-curUtil,deltaMg:newMg-curMg};
          });

          return(<>
          <div className="sl">Cotizador — Simular Nuevo Cliente</div>
          <div className="info-box">Ingresa el equipo que necesitaría el nuevo cliente y ve cuánto cobrar. El overhead se redistribuye automáticamente entre todos los clientes.</div>
          <div className="card" style={{marginBottom:16,display:"flex",alignItems:"center",gap:12}}>
            <label style={{fontSize:12,fontWeight:600,color:"#52525b",whiteSpace:"nowrap"}}>Mes base de simulación</label>
            <select value={simMonth} onChange={e=>setSimMonth(e.target.value)} style={{flex:1,maxWidth:200}}>
              {ALL_MONTHS.map(m=><option key={m.value} value={m.value}>{m.label}</option>)}
            </select>
            <span style={{fontSize:11,color:"#a1a1aa"}}>Fees y gastos se toman de este mes</span>
          </div>

          {/* Input form */}
          <div className="card" style={{marginBottom:16}}>
            <div style={{fontWeight:700,fontSize:16,marginBottom:12,color:"#18181b"}}>Datos del Nuevo Cliente</div>
            <div className="form-row" style={{marginBottom:8}}>
              <div style={{flex:2}}><label style={{fontSize:11,color:"#71717a",display:"block",marginBottom:4}}>Nombre</label>
                <input value={simName} onChange={e=>setSimName(e.target.value)} style={{width:"100%"}}/></div>
              <div style={{flex:1}}><label style={{fontSize:11,color:"#71717a",display:"block",marginBottom:4}}>Fee a evaluar (S/)</label>
                <input type="number" value={simFee} onChange={e=>setSimFee(e.target.value)} placeholder="Ej: 12000" style={{width:"100%"}}/></div>
              <div style={{flex:1}}><label style={{fontSize:11,color:"#71717a",display:"block",marginBottom:4}}>Margen objetivo (%)</label>
                <input type="number" value={simMarginTarget} onChange={e=>setSimMarginTarget(parseInt(e.target.value)||0)} style={{width:"100%"}}/></div>
            </div>
            <div style={{fontWeight:600,fontSize:12,marginBottom:8,marginTop:12}}>Equipo Dedicado</div>
            {simTeam.map((t,i)=>(<div key={t.id} style={{display:"flex",gap:6,marginBottom:4,alignItems:"center"}}>
              <input value={t.role} onChange={e=>{const nt=[...simTeam];nt[i]={...t,role:e.target.value};setSimTeam(nt);}} placeholder="Rol (ej: Diseñador)" style={{flex:1,fontSize:12,padding:"5px 8px"}}/>
              <input type="number" value={t.amount||""} onChange={e=>{const nt=[...simTeam];nt[i]={...t,amount:parseInt(e.target.value)||0};setSimTeam(nt);}} placeholder="Costo bruto (S/)" style={{width:130,fontSize:12,padding:"5px 8px",textAlign:"right"}}/>
              {simTeam.length>1&&<button type="button" className="del-btn" onClick={()=>setSimTeam(simTeam.filter((_,j)=>j!==i))}>✕</button>}
            </div>))}
            <button className="btn btn-sm btn-gray" style={{marginTop:4}} onClick={()=>setSimTeam([...simTeam,{id:Date.now(),role:"",amount:0}])}>+ Agregar persona</button>
            <div style={{fontWeight:600,fontSize:12,marginBottom:4,marginTop:12}}>Equipo Transversal <span style={{fontWeight:400,color:"#a1a1aa"}}>(opcional — se suma a planilla transversal y se reparte como overhead)</span></div>
            {simTransTeam.map((t,i)=>(<div key={t.id} style={{display:"flex",gap:6,marginBottom:4,alignItems:"center"}}>
              <input value={t.role} onChange={e=>{const nt=[...simTransTeam];nt[i]={...t,role:e.target.value};setSimTransTeam(nt);}} placeholder="Rol (ej: Coord. Diseño)" style={{flex:1,fontSize:12,padding:"5px 8px"}}/>
              <input type="number" value={t.amount||""} onChange={e=>{const nt=[...simTransTeam];nt[i]={...t,amount:parseInt(e.target.value)||0};setSimTransTeam(nt);}} placeholder="Costo bruto (S/)" style={{width:130,fontSize:12,padding:"5px 8px",textAlign:"right"}}/>
              <button type="button" className="del-btn" onClick={()=>setSimTransTeam(simTransTeam.filter((_,j)=>j!==i))}>✕</button>
            </div>))}
            <button className="btn btn-sm btn-gray" style={{marginTop:4}} onClick={()=>setSimTransTeam([...simTransTeam,{id:Date.now(),role:"",amount:0}])}>+ Agregar transversal</button>
            <div style={{fontWeight:600,fontSize:12,marginBottom:4,marginTop:12}}>Bonos <span style={{fontWeight:400,color:"#a1a1aa"}}>(bonos por persona, se suman como costo directo)</span></div>
            {simBono.map((b,i)=>(<div key={b.id} style={{display:"flex",gap:6,marginBottom:4,alignItems:"center"}}>
              <input value={b.name} onChange={e=>{const nb=[...simBono];nb[i]={...b,name:e.target.value};setSimBono(nb);}} placeholder="Persona / concepto" style={{flex:1,fontSize:12,padding:"5px 8px"}}/>
              <input type="number" value={b.amount||""} onChange={e=>{const nb=[...simBono];nb[i]={...b,amount:parseInt(e.target.value)||0};setSimBono(nb);}} placeholder="Monto (S/)" style={{width:110,fontSize:12,padding:"5px 8px",textAlign:"right"}}/>
              <button type="button" className="del-btn" onClick={()=>setSimBono(simBono.filter((_,j)=>j!==i))}>✕</button>
            </div>))}
            <button className="btn btn-sm btn-gray" style={{marginTop:4}} onClick={()=>setSimBono([...simBono,{id:Date.now(),name:"",amount:0}])}>+ Agregar bono</button>
            <div style={{fontWeight:600,fontSize:12,marginBottom:4,marginTop:12}}>Otros Gastos <span style={{fontWeight:400,color:"#a1a1aa"}}>(gasolina, correo, viáticos, herramientas, etc.)</span></div>
            {simGastos.map((g,i)=>(<div key={g.id} style={{display:"flex",gap:6,marginBottom:4,alignItems:"center"}}>
              <input value={g.name} onChange={e=>{const ng=[...simGastos];ng[i]={...g,name:e.target.value};setSimGastos(ng);}} placeholder="Concepto (ej: Gasolina)" style={{flex:1,fontSize:12,padding:"5px 8px"}}/>
              <input type="number" value={g.amount||""} onChange={e=>{const ng=[...simGastos];ng[i]={...g,amount:parseInt(e.target.value)||0};setSimGastos(ng);}} placeholder="Monto (S/)" style={{width:110,fontSize:12,padding:"5px 8px",textAlign:"right"}}/>
              <select value={g.tipo} onChange={e=>{const ng=[...simGastos];ng[i]={...g,tipo:e.target.value};setSimGastos(ng);}} style={{width:130,fontSize:11,padding:"5px 6px"}}>
                <option value="directo">Directo cliente</option><option value="overhead">Overhead gral.</option>
              </select>
              <button type="button" className="del-btn" onClick={()=>setSimGastos(simGastos.filter((_,j)=>j!==i))}>✕</button>
            </div>))}
            <button className="btn btn-sm btn-gray" style={{marginTop:4}} onClick={()=>setSimGastos([...simGastos,{id:Date.now(),name:"",amount:0,tipo:"directo"}])}>+ Agregar gasto</button>
          </div>

          {/* Results */}
          <div className="card" style={{marginBottom:16,borderLeft:"3px solid #2563eb"}}>
            <div style={{fontWeight:700,fontSize:14,marginBottom:12}}>Resultado: {simName}</div>
            <div className="grid g3" style={{marginBottom:16}}>
              <div className="card" style={{background:"#f4f4f5"}}><div className="kpi-label">Fee Mínimo (margen 0%)</div><div className="kpi-value tg">{fmt(feeMinimo)}</div><div className="kpi-sub">Punto de equilibrio</div></div>
              <div className="card" style={{background:"#f4f4f5"}}><div className="kpi-label">Fee Sugerido ({simMarginTarget}%)</div><div className="kpi-value tb">{fmt(feeSugerido)}</div><div className="kpi-sub">Margen objetivo</div></div>
              <div className="card" style={{background:newClientMargin>=simMarginTarget?"#eff6ff":newClientMargin>=0?"#fafafa":"#fff1f2"}}><div className="kpi-label">Fee Ingresado</div><div className="kpi-value" style={{color:newClientMargin>=simMarginTarget?"#2563eb":newClientMargin>=0?"#71717a":"#e11d48"}}>{simFeeVal>0?fmt(simFeeVal):"—"}</div><div className="kpi-sub">{simFeeVal>0?`Margen: ${newClientMargin.toFixed(1)}%`:"Ingresa un fee"}</div></div>
            </div>
            {simFeeVal>0&&<>
              <div style={{fontWeight:600,fontSize:12,marginBottom:8}}>Desglose con fee de {fmt(simFeeVal)}</div>
              <div className="detail-row"><span>Fee</span><span className="tg font-bold">{fmt(simFeeVal)}</span></div>
              <div className="detail-row"><span>(−) Equipo Dedicado ({simTeam.filter(t=>t.amount>0).length} persona{simTeam.filter(t=>t.amount>0).length!==1?"s":""})</span><span className="tr">{fmt(simDedCost)}</span></div>
              {simBonoCost>0&&<div className="detail-row"><span>(−) Bonos ({simBono.filter(b=>b.amount>0).length} bono{simBono.filter(b=>b.amount>0).length!==1?"s":""})</span><span className="tr">{fmt(simBonoCost)}</span></div>}
              {simDirectGastos>0&&<div className="detail-row"><span>(−) Gastos Directos ({simGastos.filter(g=>g.tipo==="directo"&&g.amount>0).length} concepto{simGastos.filter(g=>g.tipo==="directo"&&g.amount>0).length!==1?"s":""})</span><span className="tr">{fmt(simDirectGastos)}</span></div>}
              {simTransCost>0&&<div className="detail-row" style={{paddingLeft:16,fontSize:12,color:"#52525b"}}><span>↳ Transversal nuevo ({simTransTeam.filter(t=>t.amount>0).length}): {fmt(simTransCost)} → overhead</span></div>}
              {simOHGastos>0&&<div className="detail-row" style={{paddingLeft:16,fontSize:12,color:"#52525b"}}><span>↳ Gastos overhead ({simGastos.filter(g=>g.tipo==="overhead"&&g.amount>0).length}): {fmt(simOHGastos)} → overhead</span></div>}
              <div className="detail-row"><span>(−) Overhead ({newTotalFees>0?((simFeeVal/newTotalFees)*100).toFixed(1):0}% de {fmt(newOverhead)})</span><span className="ta">{fmt(Math.round(newClientOH))}</span></div>
              <div className="detail-row" style={{fontWeight:700,borderTop:"2px solid #e4e4e7",paddingTop:8}}><span>Utilidad</span><span className={newClientUtil>=0?"tg":"tr"}>{fmt(Math.round(newClientUtil))}</span></div>
              <div className="detail-row"><span>Margen</span><span className={`badge ${newClientMargin>=simMarginTarget?"bg":newClientMargin>=0?"ba":"br"}`}>{newClientMargin.toFixed(1)}%</span></div>
            </>}
          </div>

          {/* Impact on existing clients */}
          {simFeeVal>0&&<div className="card" style={{padding:0,overflow:"hidden"}}>

                const hmTeam=teamByMonth[m]||[];
                const mTransPay=snap?snap.team.reduce((s,t)=>t.assignments.filter(a=>a.clientId===null).reduce((sa,a)=>sa+a.amount,0)+s,0):hmTeam.reduce((s,t)=>s+tTrans(t),0);

                const mOH=mTransPay+mFx+mDg+mVr+mOf;
                const row={month:label.split(" ")[0],m};

                const blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});
                const url=URL.createObjectURL(blob);const a=document.createElement("a");a.href=url;a.download="finanzas_backup_"+new Date().toISOString().slice(0,10)+".json";a.click();URL.revokeObjectURL(url);
              }}>Exportar Backup (JSON)</button>
              <button className="btn btn-gray" onClick={()=>{
                const inp=document.createElement("input");inp.type="file";inp.accept=".json";
                inp.onchange=e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();
                  r.onload=ev=>{try{const d=JSON.parse(ev.target.result);
                    if(d.clients&&(d.teamByMonth||d.team)){setClients(d.clients);
                      if(d.teamByMonth){setTeamByMonth(d.teamByMonth);}else if(d.team&&d.team.length>0){const mg={};ALL_MONTHS.forEach(mo=>{mg[mo.value]=d.team.map(t=>({...t}));});setTeamByMonth(mg);}
                      setInvoices(d.invoices||[]);setProjects(d.projects||[]);
                      setFixedExp(d.fixedExp||[]);setDigitalExp(d.digitalExp||[]);setVariableExp(d.variableExp||[]);setOfficeExp(d.officeExp||[]);setInvestExp(d.investExp||[]);
                      setClientFees(d.clientFees||initFees());setMonthSnapshots(d.monthSnapshots||{});
                      if(d.staff)setStaff(d.staff);
                      if(d.roles)setRoles(d.roles);
                      setSaveMsg("Backup restaurado");setTimeout(()=>setSaveMsg(""),3000);
                    }else alert("Archivo inválido");}catch(err){alert("Error al leer: "+err.message);}};r.readAsText(f);};inp.click();
              }}>Importar Backup</button>
              <button className="btn btn-red" style={{opacity:.7}} onClick={()=>{
                if(confirm("¿Limpiar todos los datos? Se perderá todo lo ingresado.")){
                  localStorage.removeItem(STORAGE_KEY);location.reload();
                }
              }}>Limpiar Todo</button>
            </div>
          </div>
        </>)}

        </div></div>
      </div>
    </div>
  );
}

/* ═══ ROLES MANAGER COMPONENT ═══ */
function RolesManager({userRoles,loadRoles,getSB}){
  const[newRoleEmail,setNewRoleEmail]=useState("");
  const[newRoleName,setNewRoleName]=useState("");
  const[newRoleRol,setNewRoleRol]=useState("filmmaker");
  const[editingRole,setEditingRole]=useState(null);
  const[savingRole,setSavingRole]=useState(false);

  const addRole=async()=>{
    if(!newRoleEmail.trim()||!newRoleName.trim())return;
    const sb=getSB();if(!sb)return;
    setSavingRole(true);
    const{error}=await sb.from("user_roles").upsert({email:newRoleEmail.trim().toLowerCase(),nombre:newRoleName.trim(),rol:newRoleRol,activo:true},{onConflict:"email"});
    if(!error){setNewRoleEmail("");setNewRoleName("");setNewRoleRol("filmmaker");loadRoles();}
    else alert("Error: "+error.message);
    setSavingRole(false);
  };

  const updateRole=async(id,newRol)=>{
    const sb=getSB();if(!sb)return;
    await sb.from("user_roles").update({rol:newRol}).eq("id",id);
    loadRoles();setEditingRole(null);
  };

  const toggleActive=async(id,current)=>{
    const sb=getSB();if(!sb)return;
    await sb.from("user_roles").update({activo:!current}).eq("id",id);
    loadRoles();
  };

  const deleteRole=async(id,nombre)=>{
    if(!confirm("¿Eliminar a "+nombre+" del sistema de roles?"))return;
    const sb=getSB();if(!sb)return;
    await sb.from("user_roles").delete().eq("id",id);
    loadRoles();
  };

  return(<>
    <table className="data-table" style={{marginBottom:16}}>
      <thead><tr><th>Email</th><th>Nombre</th><th>Rol</th><th>Estado</th><th>Acciones</th></tr></thead>
      <tbody>
        {userRoles.length===0&&<tr><td colSpan={5} style={{textAlign:"center",color:"#a1a1aa",padding:20}}>No hay usuarios registrados</td></tr>}
        {userRoles.map(u=>(
          <tr key={u.id} style={{opacity:u.activo?1:.5}}>
            <td style={{fontSize:12}}>{u.email}</td>
            <td style={{fontWeight:600}}>{u.nombre}</td>
            <td>{editingRole===u.id?(
              <select defaultValue={u.rol} style={{fontSize:12,padding:"4px 6px"}} onChange={e=>updateRole(u.id,e.target.value)}>
                <option value="admin">admin</option>
                <option value="coordinador">coordinador</option>
                <option value="filmmaker">filmmaker</option>
              </select>
            ):<span className={`badge ${u.rol==="admin"?"bb":u.rol==="coordinador"?"bpp":"bg"}`}>{u.rol}</span>}</td>
            <td><span style={{color:u.activo?"#16a34a":"#dc2626",fontSize:12}}>{u.activo?"Activo":"Inactivo"}</span></td>
            <td style={{display:"flex",gap:4}}>
              <button className="btn btn-sm btn-gray" onClick={()=>setEditingRole(editingRole===u.id?null:u.id)}>{editingRole===u.id?"✓":"Rol"}</button>
              <button className="btn btn-sm btn-gray" onClick={()=>toggleActive(u.id,u.activo)}>{u.activo?"Desact.":"Activar"}</button>
              <button className="del-btn" onClick={()=>deleteRole(u.id,u.nombre)}>✕</button>
            </td>
          </tr>
        ))}
      </tbody>
    </table>
    <div style={{display:"flex",gap:8,alignItems:"center",flexWrap:"wrap"}}>
      <input placeholder="Email" value={newRoleEmail} onChange={e=>setNewRoleEmail(e.target.value)} style={{fontSize:12,padding:"6px 10px",border:"1px solid #e4e4e7",borderRadius:8,width:200}}/>
      <input placeholder="Nombre" value={newRoleName} onChange={e=>setNewRoleName(e.target.value)} style={{fontSize:12,padding:"6px 10px",border:"1px solid #e4e4e7",borderRadius:8,width:140}}/>
      <select value={newRoleRol} onChange={e=>setNewRoleRol(e.target.value)} style={{fontSize:12,padding:"6px 10px",border:"1px solid #e4e4e7",borderRadius:8}}>
        <option value="filmmaker">filmmaker</option>
        <option value="coordinador">coordinador</option>
        <option value="admin">admin</option>
      </select>
      <button className="btn btn-primary" onClick={addRole} disabled={savingRole||!newRoleEmail.trim()||!newRoleName.trim()}>{savingRole?"Guardando...":"+ Agregar Usuario"}</button>
    </div>
  </>);
}

  return(<>
    <button className="back-link" onClick={onBack}>← Volver</button>

      <div className="detail-row" style={{fontWeight:700,fontSize:16,borderTop:"2px solid #e4e4e7",paddingTop:12}}>
        <span>Utilidad Fee</span><span className={(c.utilFee||0)>=0?"tg":"tr"}>{fmt(c.utilFee||0)}</span></div>
      <div className="detail-row"><span>Margen</span><span className={`badge ${c.margin>=30?"bg":c.margin>=15?"ba":"br"}`}>{c.margin.toFixed(1)}%</span></div>
    </div>

      <div style={{fontWeight:700,fontSize:14,marginBottom:12,color:"#52525b"}}>Utilidad por Proyectos</div>

      <div className="detail-row" style={{fontWeight:700,borderTop:"2px solid #e4e4e7",paddingTop:12}}>
        <span>Utilidad Proyectos</span><span className={(c.utilProy||0)>=0?"tg":"tr"}>{fmt(c.utilProy||0)}</span></div>
    </div>}
    <div className="total-bar" style={{marginBottom:12}}>
      <span style={{fontSize:14}}>Utilidad Total</span>
      <span style={{fontSize:22,fontWeight:800}}>{fmt(utilTotal)}</span>
    </div>
    {c.teamMembers.length>0&&<div className="card" style={{marginBottom:12}}>
      <div style={{fontWeight:600,fontSize:13,marginBottom:8}}>Equipo asignado a esta marca</div>
      <table style={{fontSize:12}}>
        <thead><tr><th>Nombre</th><th>Rol</th><th className="text-center">Régimen</th><th className="text-right">Asignado</th><th className="text-right">Bruto total</th></tr></thead>

function InvoiceForm({clients,month,type,onAdd,onClose}){

    if(!fd.clientId){alert("Selecciona un cliente.");return;}

    if(!fd.concept.trim()){alert("Ingresa un concepto para la factura.");return;}
    onAdd({...fd,clientId:parseInt(fd.clientId),amount:amt,month,type,number:fd.number||`${prefix}-${Date.now().toString().slice(-5)}`});};
  return(<div className="form-card"><h4 style={{color:"#18181b"}}>Nueva Factura — {typeLabel}</h4>
    <form onSubmit={submit}>
      <div className="form-row"><select value={fd.clientId} onChange={e=>setFd({...fd,clientId:e.target.value})} required><option value="">Cliente</option>{clients.map(c=><option key={c.id} value={c.id}>{c.name}</option>)}</select>
        <input value={fd.number} onChange={e=>setFd({...fd,number:e.target.value})} placeholder="# Factura"/>

function TeamForm({clients,staff,roles,onAdd,onClose,preClient}){

  const[assigns,setAssigns]=useState([{id:Date.now(),clientId:preClient||null,role:"",amount:0,isPrimary:true}]);
  const[suggestions,setSuggestions]=useState([]);
  const[showSug,setShowSug]=useState(false);
  const isRH=fd.regimen==="rh";
  const bruto=parseInt(fd.bruto)||0;
  const neto=isRH?bruto:Math.round(bruto/1.1137);
  const essalud=isRH?0:Math.round(neto*0.09);
  const afp=isRH?0:Math.round(neto*0.1137);
  const inversion=isRH?bruto:bruto+essalud;

  /* Auto-adjust primary assignment when bonos change — distribute BRUTO */
  const bonoTotal=assigns.filter(a=>!a.isPrimary).reduce((s,a)=>s+(parseInt(a.amount)||0),0);
  const primaryAmount=Math.max(bruto-bonoTotal,0);

  /* Keep primary synced */
  React.useEffect(()=>{
    setAssigns(prev=>prev.map(a=>a.isPrimary?{...a,amount:primaryAmount}:a));
  },[primaryAmount]);

  const totalAssigned=assigns.reduce((s,a)=>s+(parseInt(a.amount)||0),0);

  const submit=()=>{
    if(!fd.name.trim()){alert("Ingresa el nombre de la persona.");return;}
    if(!bruto||bruto<=0){alert("El sueldo debe ser mayor a S/ 0.");return;}
    /* marca principal ya no es obligatoria — transversales van sin marca (OH) */
    /* Auto-set role on primary if missing */
    const finalAssigns=assigns.map(a=>a.isPrimary&&!a.role?{...a,role:fd.role||"Equipo"}:a);
    const valid=finalAssigns.filter(a=>a.amount>0);
    if(valid.length===0){alert("El bruto debe ser mayor a 0.");return;}
    onAdd({name:fd.name,regimen:fd.regimen,neto,essalud,afp,bruto,inversion,
      assignments:valid.map(a=>({id:Date.now()+Math.random(),clientId:a.clientId,role:a.role||fd.role||"Equipo",amount:parseInt(a.amount)||0}))});
  };

  const handleNameChange=e=>{
    const val=e.target.value;setFd({...fd,name:val});setShowSug(true);
    if(val.trim().length<2){setSuggestions([]);setShowSug(false);return;}
    const lower=val.toLowerCase();
    const filtered=(staff||[]).filter(s=>s.name.toLowerCase().includes(lower)).slice(0,5);
    setSuggestions(filtered);
  };

  const selectSuggestion=s=>{
    setFd({name:s.name,regimen:s.regimen,bruto:String(s.bruto),role:s.role});
    /* Set primary assignment with full bruto, role from staff */
    setAssigns(prev=>[{...prev[0],role:s.role,amount:s.bruto,isPrimary:true},...prev.slice(1)]);
    setSuggestions([]);setShowSug(false);
  };

  const addBono=()=>{
    setAssigns(p=>[...p,{id:Date.now(),clientId:null,role:"",amount:0,isPrimary:false}]);
