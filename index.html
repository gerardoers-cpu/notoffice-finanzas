function SimpleBar({data,keys,colors}){
  const maxVal=Math.max(...data.flatMap(d=>keys.map(k=>Math.abs(d[k]||0))),1);
  return(<div style={{display:"flex",alignItems:"flex-end",gap:8,height:180,padding:"8px 0"}}>
    {data.map((d,i)=>(<div key={i} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:4,height:"100%",justifyContent:"flex-end"}}>
      <div style={{display:"flex",alignItems:"flex-end",gap:2,flex:1,width:"100%",justifyContent:"center"}}>
        {keys.map((k,ki)=>{const v=d[k]||0;const h=Math.max((Math.abs(v)/maxVal)*140,4);
          return(<div key={ki} style={{display:"flex",flexDirection:"column",alignItems:"center"}}>
            <div style={{fontSize:8,color:"#71717a",marginBottom:2,whiteSpace:"nowrap"}}>{fmt(v)}</div>

      </div>
      <div style={{fontSize:10,color:"#a1a1aa",fontWeight:600}}>{d.label||d.month||d.name}</div>

const SB_CONFIG_KEY="finanzas_sb_config";
const getSBConfig=()=>{try{return JSON.parse(localStorage.getItem(SB_CONFIG_KEY)||"null");}catch(e){return null;}};
const setSBConfig=(cfg)=>{localStorage.setItem(SB_CONFIG_KEY,JSON.stringify(cfg));};
let _sb=null;
const getSB=()=>{
  if(_sb)return _sb;
  const cfg=getSBConfig();
  if(cfg?.url&&cfg?.key){_sb=supabase.createClient(cfg.url,cfg.key);return _sb;}
  return null;
};

const loadStateCloud=async()=>{
  const sb=getSB();if(!sb)return null;
  try{const{data,error}=await sb.from("app_state").select("data").eq("id","main").single();

};

  const sb=getSB();if(!sb)return false;
  try{const{error}=await sb.from("app_state").upsert({id:"main",data:state,updated_at:new Date().toISOString(),updated_by:email||"unknown"});

};

const initFees=()=>{

  const demoSvc={
    1:[{id:1,name:"Pauta Digital",amount:2500},{id:2,name:"Community extra",amount:800}],

  MONTHS.forEach(({value:m})=>{f[m]={};INIT_CLIENTS.forEach(c=>{

/* ═══ CSV Export helper ═══ */
const exportCSV=(filename,headers,rows)=>{
  const esc=v=>{const s=String(v==null?"":v);return s.includes(",")||s.includes('"')||s.includes('\n')?'"'+s.replace(/"/g,'""')+'"':s;};
  const csv=[headers.map(esc).join(","),...rows.map(r=>r.map(esc).join(","))].join("\n");
  const blob=new Blob(["\uFEFF"+csv],{type:"text/csv;charset=utf-8"});
  const url=URL.createObjectURL(blob);const a=document.createElement("a");a.href=url;a.download=filename;a.click();URL.revokeObjectURL(url);
};

/* ═══════════════════════════════════════ */
function App({userEmail="local",onLogout,cloudMode=false}){
  const[initialLoaded,setInitialLoaded]=useState(false);
  const saved=useRef(loadStateLocal()).current;
  const[page,setPage]=useState("recurrentes");
  const[vm,setVm]=useState("2026-04");
  const[selClient,setSelClient]=useState(null);
  const[showForm,setShowForm]=useState(null);
  const[statusFilter,setStatusFilter]=useState("");
  const[facturaTab,setFacturaTab]=useState("recurrente");
  const[gastoTab,setGastoTab]=useState("fijos");
  const[showAsignarCaja,setShowAsignarCaja]=useState(false);
  const[asigPersona,setAsigPersona]=useState("");
  const[asigMonto,setAsigMonto]=useState("");
  const[asigNota,setAsigNota]=useState("");
  const handleAsignarCaja=async()=>{
    if(!asigPersona||!asigMonto||parseFloat(asigMonto)<=0){alert("Selecciona persona y monto");return;}
    const sb=getSB();if(!sb){alert("Sin conexión a Supabase");return;}
    const{error}=await sb.from("caja_chica_asignaciones").insert({
      persona_email:asigPersona,persona_name:asigPersona.split("@")[0].replace(/\./g," ").replace(/\b\w/g,c=>c.toUpperCase()),
      monto:parseFloat(asigMonto),nota:asigNota.trim()||"Asignación de caja chica",asignado_por:userEmail
    });
    if(error)alert("Error: "+error.message);
    else{setAsigMonto("");setAsigNota("");setAsigPersona("");setShowAsignarCaja(false);loadCajaChica(vm);setSaveMsg("Caja chica asignada");setTimeout(()=>setSaveMsg(""),3000);}
  };
  const[saveMsg,setSaveMsg]=useState("");

  const[clients,setClients]=useState(saved?.clients||INIT_CLIENTS);
  const[team,setTeam]=useState(saved?.team||INIT_TEAM);
  const[invoices,setInvoices]=useState(saved?.invoices||genInvoices);
  const[projects,setProjects]=useState(saved?.projects||INIT_PROJECTS);
  const[fixedExp,setFixedExp]=useState(saved?.fixedExp||INIT_FIXED);
  const[digitalExp,setDigitalExp]=useState(saved?.digitalExp||INIT_DIGITAL);
  const[variableExp,setVariableExp]=useState(saved?.variableExp||INIT_VAR);
  const[officeExp,setOfficeExp]=useState(saved?.officeExp||INIT_OFFICE);
  const[investExp,setInvestExp]=useState(saved?.investExp||INIT_INV);

  /* Per-month fees: { month: { clientId: { base:number, services:[{id,name,amount}] } } } */
  const[clientFees,setClientFees]=useState(saved?.clientFees||initFees);
  const getEntry=(cId,m)=>(clientFees[m]&&clientFees[m][cId])||{base:0,services:[]};
  const getFee=(cId,m)=>{const e=getEntry(cId,m);return e.base+e.services.reduce((s,sv)=>s+sv.amount,0);};
  const setBase=(cId,m,v)=>setClientFees(prev=>{const e=getEntry(cId,m);return{...prev,[m]:{...prev[m],[cId]:{...e,base:v}}};});
  const addSvc=(cId,m,name,amount)=>setClientFees(prev=>{const e=getEntry(cId,m);return{...prev,[m]:{...prev[m],[cId]:{...e,services:[...e.services,{id:Date.now(),name,amount}]}}};});
  const delSvc=(cId,m,sId)=>setClientFees(prev=>{const e=getEntry(cId,m);return{...prev,[m]:{...prev[m],[cId]:{...e,services:e.services.filter(s=>s.id!==sId)}}};});
  const[expandedClient,setExpandedClient]=useState(null);
  const[editPerson,setEditPerson]=useState(null);
  const[editInvoice,setEditInvoice]=useState(null);
  /* Cotizador state */
  const[simName,setSimName]=useState("Nuevo Cliente");
  const[simFee,setSimFee]=useState("");
  const[simTeam,setSimTeam]=useState([{id:1,role:"",amount:0}]);
  const[simTransTeam,setSimTransTeam]=useState([]);
  const[simGastos,setSimGastos]=useState([]);
  const[simMarginTarget,setSimMarginTarget]=useState(30);
  const[simMonth,setSimMonth]=useState(vm);

  /* ── Snapshots por mes (para history correcta) ── */
  const[monthSnapshots,setMonthSnapshots]=useState(saved?.monthSnapshots||{});
  /* Snapshot: guarda equipo y gastos fijos del mes actual para tener history real */
  const takeSnapshot=()=>{
    setMonthSnapshots(prev=>({...prev,[vm]:{
      team:team.map(t=>({id:t.id,name:t.name,regimen:t.regimen,neto:t.neto,inversion:t.inversion||t.bruto,bruto:t.bruto,assignments:t.assignments})),
      fixedExp:fixedExp.map(e=>({...e})),digitalExp:digitalExp.map(e=>({...e})),officeExp:officeExp.map(e=>({...e})),
      savedAt:new Date().toISOString()
    }}));
  };

  /* ── Caja chica from cloud (read-only in main app) ── */
  const CAJA_PERSONAS=["ynes@notoffice.pe","andrea@notoffice.pe","gerardo@notoffice.pe"];
  const nameFromEmail=(e)=>e?e.split("@")[0].replace(/\./g," ").replace(/\b\w/g,c=>c.toUpperCase()):"";
  const[cajaChica,setCajaChica]=useState([]);
  const[cajaChicaAll,setCajaChicaAll]=useState([]);
  const[cajaAsignaciones,setCajaAsignaciones]=useState([]);
  const[loadingCaja,setLoadingCaja]=useState(false);
  const loadCajaChica=async(month)=>{
    const sb=getSB();if(!sb)return;
    setLoadingCaja(true);
    try{
      const[gRes,gAllRes,aRes]=await Promise.all([
        sb.from("caja_chica").select("*").eq("mes",month).order("fecha",{ascending:false}),
        sb.from("caja_chica").select("*").order("fecha",{ascending:false}),
        sb.from("caja_chica_asignaciones").select("*").order("fecha",{ascending:false})

      if(!gRes.error&&gRes.data)setCajaChica(gRes.data);
      if(!gAllRes.error&&gAllRes.data)setCajaChicaAll(gAllRes.data);
      if(!aRes.error&&aRes.data)setCajaAsignaciones(aRes.data);
    }catch(e){console.warn("Caja chica load:",e);}
    setLoadingCaja(false);
  };
  useEffect(()=>{if(cloudMode)loadCajaChica(vm);},[vm,cloudMode]);
  const totalCajaCloud=cajaChica.reduce((s,g)=>s+parseFloat(g.monto||0),0);
  const cajaBalances=useMemo(()=>{
    const b={};
    CAJA_PERSONAS.forEach(p=>{
      const totalAsig=cajaAsignaciones.filter(a=>a.persona_email===p).reduce((s,a)=>s+parseFloat(a.monto||0),0);
      const totalGast=cajaChicaAll.filter(g=>g.user_email===p).reduce((s,g)=>s+parseFloat(g.monto||0),0);
      b[p]={asignado:totalAsig,gastado:totalGast,saldo:totalAsig-totalGast};
    });
    return b;
  },[cajaChicaAll,cajaAsignaciones]);

  /* ── Load from cloud on first mount ── */
  useEffect(()=>{
    if(!cloudMode){setInitialLoaded(true);return;}
    loadStateCloud().then(cloudData=>{
      if(cloudData&&cloudData.clients){
        setClients(cloudData.clients);setTeam(cloudData.team||[]);setInvoices(cloudData.invoices||[]);
        setProjects(cloudData.projects||[]);setFixedExp(cloudData.fixedExp||[]);setDigitalExp(cloudData.digitalExp||[]);
        setVariableExp(cloudData.variableExp||[]);setOfficeExp(cloudData.officeExp||[]);setInvestExp(cloudData.investExp||[]);
        setClientFees(cloudData.clientFees||initFees());setMonthSnapshots(cloudData.monthSnapshots||{});
        setSaveMsg("Datos cargados de la nube");setTimeout(()=>setSaveMsg(""),3000);
      }
      setInitialLoaded(true);
    });
  },[]);

  /* ── Auto-save on data change ── */
  useEffect(()=>{
    if(!initialLoaded)return; /* don't save until cloud data is loaded */
    const state={clients,team,invoices,projects,fixedExp,digitalExp,variableExp,officeExp,investExp,clientFees,monthSnapshots};
    const timer=setTimeout(()=>{
      saveStateLocal(state); /* always save locally as backup */
      if(cloudMode){
        saveStateCloud(state,userEmail).then(ok=>{
          setSaveMsg(ok?"Guardado en la nube":"Guardado local (nube falló)");
          setTimeout(()=>setSaveMsg(""),2500);
        });
      }else{
        setSaveMsg("Guardado");setTimeout(()=>setSaveMsg(""),2000);
      }
    },1500);
    return()=>clearTimeout(timer);
  },[clients,team,invoices,projects,fixedExp,digitalExp,variableExp,officeExp,investExp,clientFees,monthSnapshots,initialLoaded]);

  const NAV=[
    {section:"Ingresos"},
    {id:"recurrentes",label:"Recurrentes (Fees)",icon:"repeat"},
    {id:"proyectos",label:"Proyectos",icon:"briefcase"},
    {section:"Egresos"},
    {id:"planilla",label:"Planilla / RH",icon:"users"},
    {id:"gastos",label:"Gastos",icon:"down"},
    {section:"Control"},
    {id:"facturas",label:"Facturas",icon:"receipt"},
    {section:"Simulación"},
    {id:"cotizador",label:"Cotizador",icon:"calculator"},
    {section:"Reportes"},
    {id:"comercial",label:"Comercial",icon:"barchart"},
    {id:"rentabilidad",label:"Rentabilidad x Cliente",icon:"pie"},
    {id:"cashflow",label:"Cashflow",icon:"dollar"},
    {id:"alertas",label:"Alertas",icon:"alert"},
    {section:""},
    {id:"config",label:"Configuración",icon:"gear"},
  ];

  /* ── calculations ── */
  const calc=useMemo(()=>{
    const totalFees=clients.reduce((s,c)=>s+getFee(c.id,vm),0);
    const mInv=invoices.filter(i=>i.month===vm);
    /* Excluir paid media de métricas de ingreso real */
    const realInv=invoices.filter(i=>i.type!=="paid");
    const paidInv=invoices.filter(i=>i.type==="paid");
    const allCob=realInv.filter(i=>i.status==="Cobrada");
    const allPC=realInv.filter(i=>i.status==="Por cobrar");
    const allEm=realInv.filter(i=>i.status==="Emitida");
    const totalCob=allCob.reduce((s,i)=>s+i.amount,0);
    const totalPC=allPC.reduce((s,i)=>s+i.amount,0);
    const totalEm=allEm.reduce((s,i)=>s+i.amount,0);
    /* Paid media totals (pass-through) */
    const paidPC=paidInv.filter(i=>i.status!=="Cobrada");
    const paidCob=paidInv.filter(i=>i.status==="Cobrada");
    const totalPaidPC=paidPC.reduce((s,i)=>s+i.amount,0);
    const totalPaidCob=paidCob.reduce((s,i)=>s+i.amount,0);
    const mCob=mInv.filter(i=>i.status==="Cobrada"&&i.type!=="paid");
    const mPC=mInv.filter(i=>i.status==="Por cobrar"&&i.type!=="paid");
    const mEm=mInv.filter(i=>i.status==="Emitida");
    const mProj=projects.filter(p=>p.month===vm);
    const totalPR=mProj.reduce((s,p)=>s+p.revenue,0);
    const totalPCost=mProj.reduce((s,p)=>s+pCost(p),0);
    const dedPay=team.reduce((s,t)=>s+tAllDed(t),0);
    const transPay=team.reduce((s,t)=>s+tTrans(t),0);
    const totalPay=dedPay+transPay;
    const tFixed=fixedExp.reduce((s,e)=>s+e.amount,0);
    const tDigital=digitalExp.reduce((s,e)=>s+e.amount,0);
    const tVar=variableExp.filter(e=>e.month===vm).reduce((s,e)=>s+e.amount,0);
    const tOffice=officeExp.reduce((s,e)=>s+e.amount,0);
    const tInvest=investExp.filter(e=>e.month===vm).reduce((s,e)=>s+e.amount,0);
    const tCajaCloud=totalCajaCloud||0;
    const overhead=transPay+tFixed+tDigital+tVar+tCajaCloud+tOffice;
    const structExp=totalPay+tFixed+tDigital+tVar+tCajaCloud+tOffice+tInvest;
    const structProfit=totalFees-structExp;
    const projProfit=totalPR-totalPCost;
    const netProfit=structProfit+projProfit;
    const totalIncome=totalFees+totalPR;
    const totalExpenses=structExp+totalPCost;
    const clientProfit=clients.map(c=>{
      const cFee=getFee(c.id,vm);
      const cTeam=team.reduce((s,t)=>s+tDed(t,c.id),0);
      const cOH=totalFees>0?(cFee/totalFees)*overhead:0;
      const cNet=cFee-cTeam-cOH;
      const cMargin=cFee>0?(cNet/cFee)*100:0;
      const cP=mProj.filter(p=>p.clientId===c.id);
      const cPR=cP.reduce((s,p)=>s+p.revenue,0);const cPC=cP.reduce((s,p)=>s+pCost(p),0);
      const cInv=invoices.filter(i=>i.clientId===c.id);
      return{...c,fee:cFee,teamCost:cTeam,oh:cOH,structNet:cNet,margin:cMargin,projRev:cPR,projCost:cPC,projProfit:cPR-cPC,
        totalNet:cNet+(cPR-cPC),teamMembers:team.filter(t=>t.assignments.some(a=>a.clientId===c.id)),projects:cP,
        cobrado:cInv.filter(i=>i.status==="Cobrada").reduce((s,i)=>s+i.amount,0),

    });
    return{totalFees,totalCob,totalPC,totalEm,allCob,allPC,allEm,mInv,mCob,mPC,mEm,totalPR,totalPCost,dedPay,transPay,totalPay,
      tFixed,tDigital,tVar,tCajaCloud,tOffice,tInvest,overhead,structExp,structProfit,projProfit,netProfit,totalIncome,totalExpenses,clientProfit,
      totalPaidPC,totalPaidCob,paidPC,paidCob};
  },[clients,team,invoices,projects,fixedExp,digitalExp,variableExp,officeExp,investExp,vm,clientFees,totalCajaCloud]);

  const history=useMemo(()=>{
    return MONTHS.map(({value:m,label})=>{
      const fees=clients.reduce((s,c)=>s+getFee(c.id,m),0);
      const pR=projects.filter(p=>p.month===m).reduce((s,p)=>s+p.revenue,0);
      const pC=projects.filter(p=>p.month===m).reduce((s,p)=>s+pCost(p),0);
      /* Usar snapshot del mes si existe, sino datos actuales */
      const snap=monthSnapshots[m];
      const pay=snap?snap.team.reduce((s,t)=>s+(t.inversion||t.bruto||0),0):team.reduce((s,t)=>s+(t.inversion||t.bruto),0);
      const fx=snap?snap.fixedExp.reduce((s,e)=>s+e.amount,0):fixedExp.reduce((s,e)=>s+e.amount,0);
      const dg=snap?snap.digitalExp.reduce((s,e)=>s+e.amount,0):digitalExp.reduce((s,e)=>s+e.amount,0);
      const vr=variableExp.filter(e=>e.month===m).reduce((s,e)=>s+e.amount,0);
      const of_=snap?snap.officeExp.reduce((s,e)=>s+e.amount,0):officeExp.reduce((s,e)=>s+e.amount,0);
      const iv=investExp.filter(e=>e.month===m).reduce((s,e)=>s+e.amount,0);
      const sExp=pay+fx+dg+vr+of_+iv;
      const hasData=invoices.some(i=>i.month===m)||projects.some(p=>p.month===m)||vr>0||iv>0||fees>0;
      return{month:label.split(" ")[0],m:m,fees,sExp,sProfit:fees-sExp,pProfit:pR-pC,total:(fees-sExp)+(pR-pC),income:fees+pR,pCost:pC,hasData,snapped:!!snap};
    });
  },[clients,team,projects,fixedExp,digitalExp,variableExp,officeExp,investExp,invoices,clientFees,monthSnapshots]);

  const filtInv=useMemo(()=>{
    let list=invoices.filter(i=>i.month===vm&&i.type===facturaTab);
    if(statusFilter)list=list.filter(i=>i.status===statusFilter);
    return list.sort((a,b)=>b.date.localeCompare(a.date));
  },[invoices,vm,statusFilter,facturaTab]);

  const pageLabel=NAV.find(n=>n.id===page)?.label||"";
  const go=(p)=>{setPage(p);setSelClient(null);setShowForm(null);};

  return(
    <div className="app">
      <div className="sidebar">
        <div className="sidebar-brand"><Ic d={ic.building} size={20} color="#dc2626"/><span>NotOffice Finanzas</span></div>
        {NAV.map((n,i)=>n.section!==undefined&&!n.id?(
          <div key={i} className="nav-section">{n.section}</div>
        ):(
          <button key={n.id} className={`nav-btn ${page===n.id?"active":""}`} onClick={()=>go(n.id)}>
            <Ic d={ic[n.icon]} size={15} color={page===n.id?"#fff":"#a1a1aa"}/>{n.label}
          </button>
        ))}
      </div>

      <div className="main">
        <div className="header">
          <h1>{pageLabel}</h1>
          <div style={{display:"flex",alignItems:"center",gap:16}}>
            {saveMsg&&<span style={{fontSize:11,color:"#dc2626",fontWeight:600,background:"#fafafa",padding:"4px 10px",borderRadius:6}}>{saveMsg}</span>}
            <button className="btn btn-sm btn-gray" title="Cerrar mes: guarda snapshot de planilla y gastos actuales para este mes" onClick={()=>{takeSnapshot();setSaveMsg("Mes cerrado ✓");setTimeout(()=>setSaveMsg(""),3000);}}>Cerrar {ML[parseInt(vm.split("-")[1])-1]}</button>
            <select className="msel" value={vm} onChange={e=>setVm(e.target.value)}>
              {MONTHS.map(m=><option key={m.value} value={m.value}>{m.label}</option>)}
            </select>
            <div className="user-bar">
              <span style={{width:8,height:8,borderRadius:"50%",background:cloudMode?"#dc2626":"#71717a",marginRight:2}} title={cloudMode?"Conectado a la nube":"Modo local"}/>
              <span style={{width:28,height:28,borderRadius:"50%",background:"#dc2626",color:"#fff",display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:700}}>{(userEmail||"YM").slice(0,2).toUpperCase()}</span>
              <strong style={{maxWidth:120,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{userEmail==="local"?"Ynes Martínez":userEmail}</strong>
              {cloudMode&&<button onClick={onLogout} style={{background:"none",border:"none",cursor:"pointer",color:"#a1a1aa",fontSize:11,fontFamily:"inherit"}}>Salir</button>}
            </div>
          </div>
        </div>

        <div className="content"><div className="ci">

        {/* ═══ INGRESOS > RECURRENTES ═══ */}
        {page==="recurrentes"&&(()=>{
          const activos=clients.filter(c=>getFee(c.id,vm)>0);
          const inactivos=clients.filter(c=>getFee(c.id,vm)===0);
          const activar=(cId)=>{const pi=MONTHS.findIndex(m=>m.value===vm)-1;const prevM=pi>=0?MONTHS[pi].value:null;
            const prevE=prevM?getEntry(cId,prevM):null;const base=prevE&&prevE.base>0?prevE.base:(clients.find(x=>x.id===cId)?.fee||0);
            setClientFees(prev=>({...prev,[vm]:{...prev[vm],[cId]:{base,services:prevE?prevE.services.map(s=>({...s,id:Date.now()+Math.random()})):[]}}}));};
          const desactivar=(cId)=>setClientFees(prev=>({...prev,[vm]:{...prev[vm],[cId]:{base:0,services:[]}}}));
          /* Detectar si el mes actual tiene datos configurados */
          const mesData=clientFees[vm]||{};
          const mesTieneDatos=Object.values(mesData).some(e=>e&&e.base>0);
          const prevMonthIdx=MONTHS.findIndex(m=>m.value===vm)-1;
          const prevMonth=prevMonthIdx>=0?MONTHS[prevMonthIdx]:null;
          const prevTieneDatos=prevMonth?Object.values(clientFees[prevMonth.value]||{}).some(e=>e&&e.base>0):false;
          const copiarDelMesAnterior=()=>{if(!prevMonth)return;
            if(mesTieneDatos&&!confirm("Este mes ya tiene datos. ¿Sobrescribir con los datos de "+prevMonth.label+"?"))return;
            setClientFees(pf=>{const nf={...pf};nf[vm]={};clients.forEach(c=>{const pe=getEntry(c.id,prevMonth.value);
              nf[vm][c.id]={base:pe.base,services:pe.services.map(s=>({...s,id:Date.now()+Math.random()}))};});return nf;});};
          return(<>
          {!mesTieneDatos&&prevTieneDatos&&(
            <div style={{background:"linear-gradient(135deg,#fafafa,#f4f4f5)",border:"2px dashed #dc2626",borderRadius:12,padding:20,marginBottom:16,textAlign:"center"}}>
              <div style={{fontSize:16,fontWeight:700,color:"#dc2626",marginBottom:6}}>Nuevo mes sin configurar</div>
              <div style={{fontSize:13,color:"#52525b",marginBottom:12}}>Pre-llena los fees de <strong>{ML[parseInt(vm.split("-")[1])-1]}</strong> copiando los datos de <strong>{prevMonth.label}</strong>. Después solo ajusta lo que cambió.</div>
              <button className="btn btn-green" style={{fontSize:14,padding:"10px 24px"}} onClick={copiarDelMesAnterior}>
                <Ic d={ic.repeat} size={16} color="#fff"/> Pre-llenar desde {prevMonth.label}
              </button>
            </div>
          )}
          <div className="info-box">Fee base + servicios por cliente, editables mes a mes. Pre-llena desde el mes anterior y ajusta solo lo que cambió.</div>
          <div className="grid g3" style={{marginBottom:16}}>
            <div className="card" style={{borderLeft:"4px solid #dc2626"}}><div className="kpi-label">Total Ingresos — {ML[parseInt(vm.split("-")[1])-1]}</div><div className="kpi-value tg">{fmt(calc.totalFees)}</div><div className="kpi-sub">{activos.length} activos · {inactivos.length} inactivos</div></div>
            <div className="card"><div className="kpi-label">Facturado (mes)</div><div className="kpi-value">{fmt(calc.mInv.filter(i=>i.type==="recurrente").reduce((s,i)=>s+i.amount,0))}</div><div className="kpi-sub">{calc.mInv.filter(i=>i.type==="recurrente").length} facturas emitidas</div></div>
            <div className="card" style={{borderColor:"#d4d4d8"}}><div className="kpi-label">Proyección Anual</div><div className="kpi-value tp">{fmt(MONTHS.reduce((s,{value:m})=>s+clients.reduce((ss,c)=>ss+getFee(c.id,m),0),0))}</div></div>

          {(()=>{

              const totalAssigned=m.assignments.reduce((s,a)=>s+a.amount,0);

                  </div>

        {/* ═══ SIMULACIÓN > COTIZADOR ═══ */}
        {page==="cotizador"&&(()=>{

          const curTotalFees=clients.reduce((s,c)=>s+getFee(c.id,simMonth),0);
          const curTransPay=team.reduce((s,t)=>s+tTrans(t),0);
          const curFixed=fixedExp.reduce((s,e)=>s+e.amount,0);
          const curDigital=digitalExp.reduce((s,e)=>s+e.amount,0);
          const curVar=variableExp.filter(e=>e.month===simMonth).reduce((s,e)=>s+e.amount,0);
          const curOffice=officeExp.reduce((s,e)=>s+e.amount,0);
          const curOverhead=curTransPay+curFixed+curDigital+curVar+curOffice;
          const curClientProfit=clients.map(c=>{const f=getFee(c.id,simMonth);const tc=team.reduce((s,t)=>s+tDed(t,c.id),0);return{...c,fee:f,teamCost:tc};}).filter(c=>c.fee>0);

          /* Sim calculations */
          const simDedCost=simTeam.reduce((s,t)=>s+(t.amount||0),0);
          const simTransCost=simTransTeam.reduce((s,t)=>s+(t.amount||0),0);
          const simDirectGastos=simGastos.filter(g=>g.tipo==="directo").reduce((s,g)=>s+(g.amount||0),0);
          const simOHGastos=simGastos.filter(g=>g.tipo==="overhead").reduce((s,g)=>s+(g.amount||0),0);
          const simDirectTotal=simDedCost+simDirectGastos; /* costos que se cargan directo al cliente */
          const simFeeVal=parseInt(simFee)||0;

          /* New totals WITH new client — transversal + gastos OH suben overhead; gastos fijos/oficina no cambian */
          const newTotalFees=curTotalFees+simFeeVal;
          const newOverhead=curOverhead+simTransCost+simOHGastos;
          const newTotalTrans=curTransPay+simTransCost;

          /* New client's numbers */
          const newClientOH=newTotalFees>0?(simFeeVal/newTotalFees)*newOverhead:0;
          const newClientUtil=simFeeVal-simDirectTotal-newClientOH;
          const newClientMargin=simFeeVal>0?(newClientUtil/simFeeVal)*100:0;

          /* Fee mínimo (margen 0%): fee = directTotal + (fee/(curFees+fee))*newOH → quadratic */
          const D=simDirectTotal;
          const a_=1;const b_=curTotalFees-newOverhead-D;const c_=-D*curTotalFees;
          const disc=b_*b_-4*a_*c_;
          const feeMinimo=disc>=0?Math.ceil((-b_+Math.sqrt(disc))/(2*a_)):D;

          /* Fee sugerido for target margin */
          const m_=simMarginTarget/100;
          const a2=1-m_;const b2=(1-m_)*curTotalFees-D-newOverhead;const c2=-D*curTotalFees;
          const disc2=b2*b2-4*a2*c2;
          const feeSugerido=disc2>=0&&a2!==0?Math.ceil((-b2+Math.sqrt(disc2))/(2*a2)):Math.ceil(D/(1-m_));

          /* Impact on existing clients */
          const impactData=curClientProfit.map(c=>{
            const curOH=curTotalFees>0?(c.fee/curTotalFees)*curOverhead:0;
            const curUtil=c.fee-c.teamCost-curOH;
            const curMg=c.fee>0?(curUtil/c.fee)*100:0;
            const newOH=newTotalFees>0?(c.fee/newTotalFees)*newOverhead:0;
            const newUtil=c.fee-c.teamCost-newOH;
            const newMg=c.fee>0?(newUtil/c.fee)*100:0;
            return{name:c.name,fee:c.fee,teamCost:c.teamCost,curOH,curUtil,curMg,newOH,newUtil,newMg,deltaUtil:newUtil-curUtil,deltaMg:newMg-curMg};
          });

          return(<>

            <div className="form-row" style={{marginBottom:8}}>

              <div className="card" style={{background:newClientMargin>=simMarginTarget?"#f4f4f5":newClientMargin>=0?"#fafafa":"#fff1f2"}}><div className="kpi-label">Fee Ingresado</div><div className="kpi-value" style={{color:newClientMargin>=simMarginTarget?"#dc2626":newClientMargin>=0?"#71717a":"#e11d48"}}>{simFeeVal>0?fmt(simFeeVal):"—"}</div><div className="kpi-sub">{simFeeVal>0?`Margen: ${newClientMargin.toFixed(1)}%`:"Ingresa un fee"}</div></div>

            {simFeeVal>0&&<>
              <div style={{fontWeight:600,fontSize:12,marginBottom:8}}>Desglose con fee de {fmt(simFeeVal)}</div>

              <div className="detail-row"><span>(−) Equipo Dedicado ({simTeam.filter(t=>t.amount>0).length} persona{simTeam.filter(t=>t.amount>0).length!==1?"s":""})</span><span className="tr">{fmt(simDedCost)}</span></div>
              {simDirectGastos>0&&<div className="detail-row"><span>(−) Gastos Directos ({simGastos.filter(g=>g.tipo==="directo"&&g.amount>0).length} concepto{simGastos.filter(g=>g.tipo==="directo"&&g.amount>0).length!==1?"s":""})</span><span className="tr">{fmt(simDirectGastos)}</span></div>}

              <div className="detail-row" style={{fontWeight:700,borderTop:"2px solid #e4e4e7",paddingTop:8}}><span>Utilidad</span><span className={newClientUtil>=0?"tg":"tr"}>{fmt(Math.round(newClientUtil))}</span></div>
              <div className="detail-row"><span>Margen</span><span className={`badge ${newClientMargin>=simMarginTarget?"bg":newClientMargin>=0?"ba":"br"}`}>{newClientMargin.toFixed(1)}%</span></div>

        {/* ═══ REPORTES > COMERCIAL ═══ */}
        {page==="comercial"&&(()=>{
          const hData=history.map(h=>({...h,ventas:h.income,utilidad:h.total}));
          const maxV=Math.max(...hData.map(h=>h.ventas),1);
          const maxU=Math.max(...hData.map(h=>Math.abs(h.utilidad)),1);
          const chartH=260;
          const barH=chartH-40;
          const accVentas=hData.reduce((s,h)=>s+h.ventas,0);
          const accUtil=hData.reduce((s,h)=>s+h.utilidad,0);
          const accMg=accVentas>0?(accUtil/accVentas*100):0;
          const mVentas=hData.filter(h=>h.ventas>0);
          const avgVentas=mVentas.length>0?accVentas/mVentas.length:0;
          const bestMonth=hData.reduce((b,h)=>h.ventas>b.ventas?h:b,hData[0]);
          const bestUtilM=hData.reduce((b,h)=>h.utilidad>b.utilidad?h:b,hData[0]);
          return(<>
          <div className="sl">Reporte Comercial — 2026</div>
          {/* KPIs anuales */}
          <div className="grid g4" style={{marginBottom:20}}>
            <div className="card" style={{borderLeft:"4px solid #dc2626"}}><div className="kpi-label">Ventas Acumuladas</div><div className="kpi-value tg">{fmt(accVentas)}</div><div className="kpi-sub">{mVentas.length} meses con ventas</div></div>
            <div className="card" style={{borderLeft:`4px solid ${accUtil>=0?"#52525b":"#e11d48"}`}}><div className="kpi-label">Utilidad Acumulada</div><div className={`kpi-value ${accUtil>=0?"tb":"tr"}`}>{fmt(accUtil)}</div><div className="kpi-sub">Margen: {accMg.toFixed(1)}%</div></div>
            <div className="card" style={{borderLeft:"4px solid #52525b"}}><div className="kpi-label">Promedio Mensual</div><div className="kpi-value" style={{color:"#52525b"}}>{fmt(Math.round(avgVentas))}</div><div className="kpi-sub">ventas / mes</div></div>
            <div className="card" style={{borderLeft:"4px solid #71717a"}}><div className="kpi-label">Mejor Mes (Ventas)</div><div className="kpi-value ta">{bestMonth.month}</div><div className="kpi-sub">{fmt(bestMonth.ventas)}</div></div>
          </div>
          {/* Gráfico: Barras (ventas) + Línea (utilidad) */}
          <div className="card" style={{marginBottom:20}}>
            <div style={{fontWeight:700,fontSize:14,marginBottom:4}}>Ventas vs Utilidad — Mes a Mes</div>
            <div style={{fontSize:11,color:"#a1a1aa",marginBottom:16}}>Barras = Ventas (Fees + Proyectos) · Línea = Utilidad Neta</div>
            <div style={{position:"relative",height:chartH,display:"flex",alignItems:"flex-end",gap:0,padding:"0 4px"}}>
              {/* Grid lines */}
              {[0,25,50,75,100].map(p=><div key={p} style={{position:"absolute",left:0,right:0,bottom:40+barH*(p/100),height:1,background:"#f4f4f5",zIndex:0}}/>)}
              {/* Y-axis labels */}
              {[0,50,100].map(p=><div key={p} style={{position:"absolute",left:-4,bottom:36+barH*(p/100),fontSize:9,color:"#d4d4d8"}}>{fmt(Math.round(maxV*(p/100)))}</div>)}
              {/* Bars */}
              {hData.map((h,i)=>{
                const bH=Math.max((h.ventas/maxV)*barH,2);
                return(<div key={i} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"flex-end",height:chartH,position:"relative",zIndex:1}}>
                  <div style={{fontSize:9,color:"#dc2626",fontWeight:600,marginBottom:2}}>{h.ventas>0?fmt(h.ventas):""}</div>
                  <div style={{width:"60%",maxWidth:48,height:bH,background:"linear-gradient(180deg,#dc2626,#dc2626)",borderRadius:"6px 6px 0 0",position:"relative"}}/>
                  <div style={{fontSize:10,color:"#71717a",fontWeight:600,marginTop:6,height:20}}>{h.month}</div>
                </div>);
              })}
              {/* Line overlay (utilidad) */}
              <svg style={{position:"absolute",left:0,top:0,width:"100%",height:chartH,pointerEvents:"none",zIndex:2}}>
                {hData.map((h,i)=>{
                  if(i===0)return null;
                  const prev=hData[i-1];
                  const w=100/hData.length;
                  const x1=(i-1)*w+w/2;
                  const x2=i*w+w/2;
                  const scaleU=v=>chartH-40-((v/maxV)*barH);
                  const y1=scaleU(prev.utilidad);
                  const y2=scaleU(h.utilidad);
                  return(<line key={i} x1={`${x1}%`} y1={y1} x2={`${x2}%`} y2={y2} stroke="#52525b" strokeWidth="2.5" strokeLinecap="round"/>);
                })}
                {hData.map((h,i)=>{
                  const w=100/hData.length;
                  const cx=i*w+w/2;
                  const cy=chartH-40-((h.utilidad/maxV)*barH);
                  return(<g key={i}>
                    <circle cx={`${cx}%`} cy={cy} r="5" fill="#fff" stroke="#52525b" strokeWidth="2.5"/>
                    <text x={`${cx}%`} y={cy-10} textAnchor="middle" fontSize="9" fontWeight="600" fill="#52525b">{h.utilidad!==0?fmt(h.utilidad):""}</text>
                  </g>);
                })}
              </svg>
            </div>
            <Leg items={[["Ventas (Fees + Proyectos)","#dc2626"],["Utilidad Neta","#52525b"]]}/>
          </div>
          {/* Tabla detalle */}
          <div className="card" style={{padding:0,overflow:"hidden"}}>
            <table style={{fontSize:12}}>
              <thead><tr><th>Mes</th><th className="text-right">Fees</th><th className="text-right">Proyectos</th><th className="text-right" style={{color:"#dc2626"}}>Ventas Total</th><th className="text-right">Egresos</th><th className="text-right" style={{color:"#52525b"}}>Utilidad</th><th className="text-center">Margen</th></tr></thead>
              <tbody>
                {hData.map((h,i)=>{const mg=h.ventas>0?(h.utilidad/h.ventas*100):0;return(
                  <tr key={i} style={{background:h.month===MONTHS.find(m=>m.value===vm)?.label.split(" ")[0]?"#f4f4f5":"transparent"}}>
                    <td style={{fontWeight:600}}>{h.month}</td>
                    <td className="text-right">{fmt(h.fees)}</td>
                    <td className="text-right">{fmt(h.income-h.fees)}</td>

                    <td className="text-right tr">{fmt(h.sExp+h.pCost)}</td>
                    <td className={`text-right font-bold ${h.utilidad>=0?"tb":"tr"}`}>{fmt(h.utilidad)}</td>

                  <td>TOTAL</td>
                  <td className="text-right">{fmt(hData.reduce((s,h)=>s+h.fees,0))}</td>
                  <td className="text-right">{fmt(hData.reduce((s,h)=>s+(h.income-h.fees),0))}</td>
                  <td className="text-right tg">{fmt(accVentas)}</td>
                  <td className="text-right tr">{fmt(hData.reduce((s,h)=>s+h.sExp+h.pCost,0))}</td>
                  <td className={`text-right ${accUtil>=0?"tb":"tr"}`}>{fmt(accUtil)}</td>
                  <td className="text-center"><span className={`badge ${accMg>=20?"bg":accMg>=10?"ba":"br"}`}>{accMg.toFixed(1)}%</span></td>
                </tr>
              </tbody>
            </table>
          </div>
          <div style={{marginTop:12,display:"flex",gap:8}}>
            <button className="btn btn-gray" onClick={()=>{
              const rows=hData.map(h=>{const mg=h.ventas>0?(h.utilidad/h.ventas*100):0;return[h.month,h.fees,h.income-h.fees,h.ventas,h.sExp+h.pCost,h.utilidad,mg.toFixed(1)+"%"];});
              exportCSV("comercial_2026.csv",["Mes","Fees","Proyectos","Ventas Total","Egresos","Utilidad","Margen"],rows);
            }}>Exportar CSV</button>
          </div>
        </>);})()}

        {/* ═══ REPORTES > ALERTAS ═══ */}
        {page==="alertas"&&(()=>{
          /* Generar alertas dinámicas */
          const alerts=[];
          /* 1. Clientes con margen negativo */
          calc.clientProfit.filter(c=>c.margin<0&&c.fee>0).forEach(c=>{
            alerts.push({type:"danger",icon:ic.down,title:`${c.name}: margen negativo`,desc:`Margen ${c.margin.toFixed(1)}% — el costo del equipo + overhead supera el fee de ${fmt(c.fee)}`,section:"rentabilidad"});
          });
          /* 2. Clientes con margen bajo (<15%) */
          calc.clientProfit.filter(c=>c.margin>=0&&c.margin<15&&c.fee>0).forEach(c=>{
            alerts.push({type:"warning",icon:ic.alert,title:`${c.name}: margen bajo`,desc:`Margen ${c.margin.toFixed(1)}% — riesgo de ser no rentable si aumentan costos`,section:"rentabilidad"});
          });
          /* 3. Facturas emitidas sin avanzar a cobro (sin paid) */
          const emitidas=invoices.filter(i=>i.status==="Emitida"&&i.type!=="paid");
          if(emitidas.length>0){
            alerts.push({type:"info",icon:ic.file,title:`${emitidas.length} factura${emitidas.length>1?"s":""} en estado Emitida`,desc:`Total: ${fmt(emitidas.reduce((s,i)=>s+i.amount,0))} — pendiente de pasar a "Por cobrar"`,section:"facturas"});
          }
          /* 4. Facturas por cobrar (sin paid) */
          if(calc.allPC.length>0){
            alerts.push({type:"warning",icon:ic.dollar,title:`${calc.allPC.length} factura${calc.allPC.length>1?"s":""} por cobrar`,desc:`Total pendiente: ${fmt(calc.totalPC)} (sin paid media)`,section:"facturas"});
          }
          /* Paid media excluido de alertas — es manejo personal */
          /* 5. Meses en rojo */
          const redMonths=history.filter(h=>h.hasData&&h.total<0);
          if(redMonths.length>0){
            alerts.push({type:"danger",icon:ic.trend,title:`${redMonths.length} mes${redMonths.length>1?"es":""} con utilidad negativa`,desc:redMonths.map(h=>`${h.month}: ${fmt(h.total)}`).join(" · "),section:"comercial"});
          }
          /* 6. Egresos > Ingresos en mes actual */
          if(calc.netProfit<0){
            alerts.push({type:"danger",icon:ic.down,title:"Mes actual en rojo",desc:`Utilidad neta: ${fmt(calc.netProfit)} — los egresos (${fmt(calc.totalExpenses)}) superan ingresos (${fmt(calc.totalIncome)})`,section:"comercial"});
          }
          /* 7. Proyectos con margen bajo */
          projects.filter(p=>p.month===vm).forEach(p=>{
            const mg=p.revenue>0?((p.revenue-pCost(p))/p.revenue)*100:0;
            if(mg<15&&p.revenue>0){alerts.push({type:"warning",icon:ic.briefcase,title:`Proyecto "${p.name}": margen ${mg.toFixed(0)}%`,desc:`Ingreso ${fmt(p.revenue)} vs Costos ${fmt(pCost(p))}`,section:"proyectos"});}
          });
          /* Counts */
          const dangers=alerts.filter(a=>a.type==="danger").length;
          const warnings=alerts.filter(a=>a.type==="warning").length;
          const infos=alerts.filter(a=>a.type==="info").length;
          const colorMap={danger:"#e11d48",warning:"#71717a",info:"#3f3f46"};
          const bgMap={danger:"#fff1f2",warning:"#fafafa",info:"#f4f4f5"};
          const borderMap={danger:"#fecaca",warning:"#d4d4d8",info:"#e4e4e7"};
          return(<>
          <div className="sl">Centro de Alertas — {MONTHS.find(m=>m.value===vm)?.label}</div>
          {/* Resumen rápido */}

                inp.onchange=e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();

                    if(d.clients&&d.team){setClients(d.clients);setTeam(d.team);setInvoices(d.invoices||[]);setProjects(d.projects||[]);
                      setFixedExp(d.fixedExp||[]);setDigitalExp(d.digitalExp||[]);setVariableExp(d.variableExp||[]);setOfficeExp(d.officeExp||[]);setInvestExp(d.investExp||[]);
                      setClientFees(d.clientFees||initFees());setMonthSnapshots(d.monthSnapshots||{});
                      setSaveMsg("Backup restaurado");setTimeout(()=>setSaveMsg(""),3000);
                    }else alert("Archivo inválido");}catch(err){alert("Error al leer: "+err.message);}};r.readAsText(f);};inp.click();
              }}>Importar Backup</button>
              <button className="btn btn-red" style={{opacity:.7}} onClick={()=>{
                if(confirm("¿Restaurar todos los datos a los valores de demostración? Se perderá todo lo ingresado.")){

                }
              }}>Restaurar Demo</button>

      </div>
    </div>
  );
}

function TeamForm({clients,onAdd,onClose}){
  const[fd,setFd]=useState({name:"",regimen:"planilla",neto:""});
  const[assigns,setAssigns]=useState([{id:Date.now(),clientId:null,role:"",amount:0}]);
  const isRH=fd.regimen==="rh";
  const neto=parseInt(fd.neto)||0;
  const essalud=isRH?0:Math.round(neto*0.09);
  const afp=isRH?0:Math.round(neto*0.115);
  const bruto=neto+afp; /* sueldo bruto = neto + AFP */
  const inversion=neto+afp+essalud; /* inversión total empresa */
  const totalAssigned=assigns.reduce((s,a)=>s+(a.amount||0),0);
  const submit=e=>{e.preventDefault();
    if(!fd.name.trim()){alert("Ingresa el nombre de la persona.");return;}
    if(!neto||neto<=0){alert("El sueldo neto debe ser mayor a S/ 0.");return;}
    if(neto>50000){alert("Verifica el sueldo: S/ "+neto.toLocaleString()+" parece muy alto.");return;}
    const valid=assigns.filter(a=>a.role&&a.amount>0);
    if(valid.length===0){alert("Agrega al menos una asignación con rol y monto.");return;}
    onAdd({name:fd.name,regimen:fd.regimen,neto,essalud,afp,bruto,inversion,
      assignments:valid.map(a=>({...a,id:Date.now()+Math.random()}))});};
  return(<div className="form-card" style={{background:"#f4f4f5",borderColor:"#e4e4e7"}}>
    <h4 style={{color:"#52525b"}}>Nueva Persona</h4>
    <form onSubmit={submit}>
      <div className="form-row">
        <input value={fd.name} onChange={e=>setFd({...fd,name:e.target.value})} placeholder="Nombre completo" required/>
        <select value={fd.regimen} onChange={e=>setFd({...fd,regimen:e.target.value})}>
          <option value="planilla">Planilla (con EsSalud/AFP)</option><option value="rh">RH - Recibo por Honorarios</option>
        </select>
      </div>
      <div className="form-row" style={{alignItems:"center"}}>
        <input type="number" value={fd.neto} onChange={e=>setFd({...fd,neto:e.target.value})} placeholder={isRH?"Monto RH (S/)":"Sueldo Neto (S/)"} required/>
        {!isRH&&neto>0&&<div style={{fontSize:11,color:"#71717a",lineHeight:1.6}}>
          <div>AFP (11.5%): <strong>{fmt(afp)}</strong> → Bruto: <strong>{fmt(bruto)}</strong></div>
          <div>EsSalud (9%): <strong>{fmt(essalud)}</strong> → <span className="tr" style={{fontWeight:700}}>Inversión: {fmt(inversion)}</span></div>
        </div>}
        {isRH&&neto>0&&<div style={{fontSize:12,fontWeight:600}}><span style={{color:"#a1a1aa"}}>Total:</span> <span className="tr">{fmt(neto)}</span></div>}
      </div>
      <div style={{fontSize:12,fontWeight:600,color:"#71717a",margin:"8px 0 6px"}}>Distribución del costo ({assigns.length} asignación{assigns.length>1?"es":""})</div>
      {assigns.map(a=><AssignRow key={a.id} a={a} clients={clients} canDel={assigns.length>1}
        onChange={up=>setAssigns(p=>p.map(x=>x.id===a.id?up:x))} onDel={()=>setAssigns(p=>p.filter(x=>x.id!==a.id))}/>)}
      <button type="button" className="btn btn-sm btn-gray" onClick={()=>setAssigns(p=>[...p,{id:Date.now(),clientId:null,role:"",amount:0}])} style={{marginBottom:8}}>+ Otra asignación (bono / otra marca)</button>
      {inversion>0&&<div style={{fontSize:11,padding:"6px 10px",borderRadius:6,marginBottom:6,
        background:totalAssigned===inversion?"#f4f4f5":totalAssigned>inversion?"#fff1f2":"#fafafa",
        color:totalAssigned===inversion?"#dc2626":totalAssigned>inversion?"#e11d48":"#3f3f46"}}>
        Asignado: {fmt(totalAssigned)} / {fmt(inversion)} {totalAssigned===inversion?" — OK ✓":totalAssigned>inversion?" — Excede la inversión":" — Falta asignar "+fmt(inversion-totalAssigned)}
      </div>}
      <div style={{display:"flex",gap:6}}><button type="submit" className="btn btn-blue">Agregar</button><button type="button" className="btn btn-gray" onClick={onClose}>Cancelar</button></div>
    </form>
  </div>);
}

}

/* ═══ AUTH WRAPPER ═══ */
function AuthWrapper(){
  const[user,setUser]=useState(null);
  const[loading,setLoading]=useState(true);
  const[authMode,setAuthMode]=useState("login"); /* login, setup */
  const[email,setEmail]=useState("");
  const[password,setPassword]=useState("");
  const[error,setError]=useState("");
  const[info,setInfo]=useState("");

  const sbCfg=getSBConfig();
  const hasConfig=!!(sbCfg?.url&&sbCfg?.key);

  useEffect(()=>{
    if(!hasConfig){setLoading(false);setUser({email:"local",mode:"local"});return;}
    const sb=getSB();if(!sb){setLoading(false);return;}
    sb.auth.getSession().then(({data:{session}})=>{
      if(session?.user)setUser({email:session.user.email,mode:"cloud"});
      setLoading(false);
    });
    const{data:{subscription}}=sb.auth.onAuthStateChange((_,session)=>{
      if(session?.user)setUser({email:session.user.email,mode:"cloud"});
      else setUser(null);
    });
    return()=>subscription.unsubscribe();
  },[]);

  const handleLogin=async(e)=>{
    e.preventDefault();setError("");
    const sb=getSB();if(!sb){setError("Supabase no configurado");return;}
    const{error:err}=await sb.auth.signInWithPassword({email,password});
    if(err)setError(err.message==="Invalid login credentials"?"Email o contraseña incorrectos":err.message);
  };
  const handleSignup=async(e)=>{
    e.preventDefault();setError("");setInfo("");
    const sb=getSB();if(!sb){setError("Supabase no configurado");return;}
    const{error:err}=await sb.auth.signUp({email,password});
    if(err)setError(err.message);
    else setInfo("Cuenta creada. Revisa tu email para confirmar (puede estar en spam).");
  };
  const handleGoogleLogin=async()=>{
    setError("");
    const sb=getSB();if(!sb){setError("Supabase no configurado");return;}
    const{error:err}=await sb.auth.signInWithOAuth({provider:"google",options:{redirectTo:window.location.origin}});
    if(err)setError(err.message);
  };
  const handleLogout=async()=>{const sb=getSB();if(sb)await sb.auth.signOut();setUser(null);};

  if(loading)return(<div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"100vh",fontFamily:"Inter,sans-serif"}}>
    <div style={{textAlign:"center"}}><div style={{fontSize:24,fontWeight:700,color:"#dc2626",marginBottom:8}}>NotOffice Finanzas</div><div style={{color:"#a1a1aa"}}>Cargando...</div></div>
  </div>);

  /* No Supabase config — run in local mode silently */
  if(!hasConfig&&user?.mode==="local")return <App userEmail="local" onLogout={()=>{}} cloudMode={false}/>;

  /* Supabase configured but not logged in */
  if(hasConfig&&!user)return(
    <div style={{display:"flex",alignItems:"center",justifyContent:"center",minHeight:"100vh",background:"#fafafa",fontFamily:"Inter,sans-serif"}}>
      <div style={{background:"#fff",borderRadius:16,padding:32,width:380,boxShadow:"0 4px 24px rgba(0,0,0,.08)"}}>
        <div style={{textAlign:"center",marginBottom:24}}>
          <div style={{fontSize:28,fontWeight:700,color:"#dc2626",marginBottom:4}}>NotOffice Finanzas</div>
          <div style={{fontSize:13,color:"#a1a1aa"}}>Ingresa con tu cuenta para acceder</div>
        </div>
        {error&&<div style={{background:"#fff1f2",color:"#e11d48",padding:"8px 12px",borderRadius:8,fontSize:12,marginBottom:12}}>{error}</div>}
        {info&&<div style={{background:"#fafafa",color:"#dc2626",padding:"8px 12px",borderRadius:8,fontSize:12,marginBottom:12}}>{info}</div>}
        <form onSubmit={handleLogin}>
          <div style={{marginBottom:12}}><label style={{fontSize:11,color:"#71717a",display:"block",marginBottom:4}}>Email</label>
            <input type="email" value={email} onChange={e=>setEmail(e.target.value)} required style={{width:"100%",padding:"10px 14px",border:"1px solid #e4e4e7",borderRadius:8,fontSize:14,fontFamily:"inherit"}}/></div>
          <div style={{marginBottom:16}}><label style={{fontSize:11,color:"#71717a",display:"block",marginBottom:4}}>Contraseña</label>
            <input type="password" value={password} onChange={e=>setPassword(e.target.value)} required minLength={6} style={{width:"100%",padding:"10px 14px",border:"1px solid #e4e4e7",borderRadius:8,fontSize:14,fontFamily:"inherit"}}/></div>
          <button type="submit" style={{width:"100%",padding:"12px",background:"#dc2626",color:"#fff",border:"none",borderRadius:8,fontSize:14,fontWeight:600,cursor:"pointer",fontFamily:"inherit",marginBottom:8}}>Ingresar</button>
          <button type="button" onClick={handleSignup} style={{width:"100%",padding:"10px",background:"#f4f4f5",color:"#52525b",border:"none",borderRadius:8,fontSize:13,fontWeight:500,cursor:"pointer",fontFamily:"inherit"}}>Crear cuenta nueva</button>
        </form>
        <div style={{display:"flex",alignItems:"center",gap:12,margin:"16px 0"}}>
          <div style={{flex:1,height:1,background:"#e4e4e7"}}/>
          <span style={{fontSize:12,color:"#a1a1aa"}}>o</span>
          <div style={{flex:1,height:1,background:"#e4e4e7"}}/>
        </div>
        <button onClick={handleGoogleLogin} style={{width:"100%",padding:"12px",background:"#fff",color:"#18181b",border:"1px solid #e4e4e7",borderRadius:8,fontSize:14,fontWeight:500,cursor:"pointer",fontFamily:"inherit",display:"flex",alignItems:"center",justifyContent:"center",gap:10}}>
          <svg width="18" height="18" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
          Ingresar con Google (@notoffice.pe)
        </button>
        <div style={{marginTop:16,textAlign:"center"}}>
          <button onClick={()=>{setSBConfig(null);_sb=null;location.reload();}} style={{background:"none",border:"none",color:"#a1a1aa",fontSize:11,cursor:"pointer",fontFamily:"inherit"}}>Desconectar de la nube (modo local)</button>
        </div>
      </div>
    </div>
  );

  /* Logged in */
  return <App userEmail={user?.email||"local"} onLogout={handleLogout} cloudMode={hasConfig}/>;
}

/* ═══ SETUP SUPABASE (in Config page) ═══ */
function SupabaseSetup({onDone}){
  const cfg=getSBConfig()||{};
  const[url,setUrl]=useState(cfg.url||"");
  const[key,setKey]=useState(cfg.key||"");
  const[testing,setTesting]=useState(false);
  const[result,setResult]=useState("");
  const test=async()=>{
    if(!url||!key){setResult("Completa ambos campos.");return;}
    setTesting(true);setResult("");
    try{const sb=supabase.createClient(url,key);
      const{data,error}=await sb.from("app_state").select("id").limit(1);
      if(error)setResult("Error: "+error.message+". Verifica la URL, key, y que hayas ejecutado el SQL.");
      else{setResult("Conexión exitosa. Guardando...");setSBConfig({url,key});_sb=null;
        setTimeout(()=>{if(onDone)onDone();else location.reload();},1500);}
    }catch(e){setResult("Error de conexión: "+e.message);}
    setTesting(false);
  };
  return(<div className="card" style={{marginBottom:16,borderLeft:"4px solid #dc2626"}}>
    <div style={{fontWeight:700,fontSize:14,marginBottom:8,color:"#dc2626"}}>Conectar a la Nube (Supabase)</div>
    <div style={{fontSize:12,color:"#71717a",marginBottom:12}}>Conecta a Supabase para tener datos compartidos, backups automáticos, y acceso desde cualquier dispositivo. Sigue la guía de despliegue para obtener estos datos.</div>
    <div style={{marginBottom:8}}><label style={{fontSize:11,color:"#71717a",display:"block",marginBottom:4}}>Supabase URL</label>
      <input value={url} onChange={e=>setUrl(e.target.value)} placeholder="https://xxx.supabase.co" style={{width:"100%",padding:"8px 12px",border:"1px solid #e4e4e7",borderRadius:8,fontSize:13,fontFamily:"inherit"}}/></div>
    <div style={{marginBottom:12}}><label style={{fontSize:11,color:"#71717a",display:"block",marginBottom:4}}>Supabase Anon Key</label>
      <input value={key} onChange={e=>setKey(e.target.value)} placeholder="eyJhbGci..." style={{width:"100%",padding:"8px 12px",border:"1px solid #e4e4e7",borderRadius:8,fontSize:13,fontFamily:"inherit"}}/></div>
    <div style={{display:"flex",gap:8,alignItems:"center"}}>
      <button className="btn btn-green" onClick={test} disabled={testing}>{testing?"Probando...":"Probar y Conectar"}</button>
      {cfg.url&&<button className="btn btn-gray" onClick={()=>{setSBConfig(null);_sb=null;location.reload();}}>Desconectar</button>}
    </div>
    {result&&<div style={{marginTop:8,fontSize:12,padding:"8px 12px",borderRadius:8,background:result.includes("exitosa")?"#fafafa":"#fff1f2",color:result.includes("exitosa")?"#dc2626":"#e11d48"}}>{result}</div>}
    {cfg.url&&<div style={{marginTop:8,fontSize:11,color:"#dc2626"}}>Conectado a: {cfg.url}</div>}
  </div>);
}

ReactDOM.render(<AuthWrapper/>,document.getElementById("root"));
</script>
</body>
</html>
