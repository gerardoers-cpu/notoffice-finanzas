<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NotOffice — Movilidad</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',system-ui,-apple-system,sans-serif;background:#fafafa;color:#18181b}
.app{max-width:1060px;margin:0 auto;padding:20px 24px;min-height:100vh}

.top-bar{display:flex;align-items:center;justify-content:space-between;padding-bottom:20px;border-bottom:1px solid #f0f0f0;margin-bottom:24px}
.top-bar h1{font-size:24px;font-weight:800;letter-spacing:-.5px}
.top-bar .sub{font-size:12px;color:#a1a1aa;margin-top:2px}
.logout-btn{background:#18181b;border:none;color:#fff;padding:8px 16px;border-radius:20px;font-size:11px;cursor:pointer;font-family:inherit;font-weight:600}

.tabs{display:flex;gap:4px;margin-bottom:20px;background:#f4f4f5;border-radius:12px;padding:4px;flex-wrap:wrap}
.tab{padding:9px 18px;border:none;border-radius:10px;background:transparent;font-size:12px;font-weight:500;cursor:pointer;font-family:inherit;color:#71717a;transition:all .15s}
.tab.active{background:#fff;color:#18181b;box-shadow:0 1px 4px rgba(0,0,0,.06);font-weight:600}

.card{background:#fff;border-radius:16px;padding:20px;border:1px solid #f0f0f0;margin-bottom:14px}
.kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
.kpi{background:#fff;border-radius:14px;padding:16px;border:1px solid #f0f0f0;text-align:center}
.kpi .val{font-size:22px;font-weight:800;letter-spacing:-.5px}
.kpi .lbl{font-size:10px;text-transform:uppercase;letter-spacing:.8px;color:#a1a1aa;margin-top:2px;font-weight:600}
@media(max-width:700px){.kpi-row{grid-template-columns:repeat(2,1fr)}}

table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;padding:10px 12px;font-size:10px;text-transform:uppercase;letter-spacing:.8px;color:#a1a1aa;border-bottom:2px solid #f0f0f0;font-weight:700}
td{padding:10px 12px;border-bottom:1px solid #f4f4f5}
tr:hover td{background:#fafafa}
.text-right{text-align:right}

.badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:10px;font-weight:600}
.b-pend{background:#fef3c7;color:#92400e}.b-ok{background:#d1fae5;color:#065f46}.b-rej{background:#fee2e2;color:#991b1b}
.b-manual{background:#ede9fe;color:#5b21b6}.b-app{background:#dbeafe;color:#1e40af}.b-agencia{background:#f4f4f5;color:#52525b}

.btn{padding:7px 14px;border:none;border-radius:8px;font-size:11px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .15s}
.btn-approve{background:#059669;color:#fff}.btn-reject{background:#dc2626;color:#fff}
.btn-gray{background:#f4f4f5;color:#52525b}.btn-dark{background:#18181b;color:#fff}
.btn-sm{padding:5px 10px;font-size:10px}

input,select{padding:7px 12px;border:1.5px solid #e4e4e7;border-radius:8px;font-size:13px;font-family:inherit;background:#fff;color:#18181b;outline:none}
input:focus,select:focus{border-color:#18181b}

.filter-bar{display:flex;gap:8px;align-items:center;margin-bottom:16px;flex-wrap:wrap}
.bulk-bar{background:#18181b;color:#fff;padding:12px 18px;border-radius:12px;display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.action-row{display:flex;gap:6px;align-items:center}
.empty{text-align:center;padding:40px 20px;color:#a1a1aa}
.empty-icon{font-size:36px;margin-bottom:8px;opacity:.3}
.del-btn{background:none;border:none;color:#d4d4d8;cursor:pointer;font-size:14px;padding:2px}.del-btn:hover{color:#dc2626}

/* ── Filmmaker selector pills ── */
.fm-pills{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:16px}
.fm-pill{padding:8px 16px;border:1.5px solid #e4e4e7;border-radius:50px;background:#fff;cursor:pointer;font-family:inherit;font-size:12px;font-weight:600;transition:all .15s;color:#71717a}
.fm-pill:hover{border-color:#18181b;color:#18181b}
.fm-pill.active{border-color:#18181b;background:#18181b;color:#fff}
.fm-pill .count{font-size:10px;opacity:.6;margin-left:4px}

/* ── Quick entry row ── */
.entry-row{display:flex;gap:8px;align-items:center;margin-bottom:8px;flex-wrap:wrap}
.entry-row input,.entry-row select{font-size:12px;padding:8px 10px}

/* ── Month navigator ── */
.month-nav{display:flex;align-items:center;gap:8px;margin-bottom:16px}
.month-nav button{background:none;border:1px solid #e4e4e7;border-radius:8px;padding:6px 12px;cursor:pointer;font-family:inherit;font-size:12px;font-weight:600;color:#52525b}
.month-nav button:hover{background:#f4f4f5}
.month-nav .current{font-weight:800;font-size:14px;min-width:120px;text-align:center}

/* ── Inline entry table ── */
.entry-table td{padding:6px 8px}
.entry-table input,.entry-table select{width:100%;font-size:12px;padding:6px 8px;border-radius:6px}

/* ── Login ── */
.login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;background:#fafafa;padding:20px}
.login-box{background:#fff;border-radius:20px;padding:36px 28px;width:100%;max-width:380px;border:1px solid #f0f0f0}
.login-title{font-size:28px;font-weight:800;letter-spacing:-.5px;text-align:center;margin-bottom:4px}
.login-sub{font-size:13px;color:#a1a1aa;text-align:center;margin-bottom:24px}
label{display:block;font-size:11px;font-weight:600;color:#a1a1aa;margin-bottom:6px;text-transform:uppercase;letter-spacing:.8px}
.field{margin-bottom:14px}
.field input{width:100%;padding:12px 14px;border-radius:12px;font-size:15px}
.btn-full{width:100%;padding:14px;border-radius:12px;font-size:14px}
.btn-google{background:#fff;color:#18181b;border:1.5px solid #e4e4e7;display:flex;align-items:center;justify-content:center;gap:10px;font-weight:600;width:100%;padding:14px;border-radius:12px;font-size:14px;cursor:pointer;font-family:inherit}

/* ── Inline edit highlight ── */
.new-row td{background:#fefce8}
.agencia-row{background:#f8f8f8}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const{useState,useEffect,useMemo,useRef}=React;
const fmt=n=>"S/ "+Math.round(n).toLocaleString("es-PE");
const ML=["Ene","Feb","Mar","Abr","May","Jun","Jul","Ago","Sep","Oct","Nov","Dic"];
const MARCAS=["Marca Alpha","Marca Beta","Marca Gamma","Marca Delta","Marca Épsilon","Marca Zeta","Agencia"];
const Logo=({width=140,color="#18181b"})=>(<svg width={width} viewBox="0 0 556 53" fill={color} xmlns="http://www.w3.org/2000/svg"><polygon points="58.9 51.73 37.08 51.78 26.13 20.97 16.95 51.73 0 51.75 14.85 1.26 37.27 1.23 47.88 31.18 56.81 1.24 73.72 1.25 58.9 51.73"/><path d="M134.8,19.82c-1.85,25.09-29.46,38.53-51.69,31.24-7.11-2.33-11.96-8.56-12-15.96-.06-10.88,5.54-20.75,14.4-27.15C96.33.13,110.76-2.18,123.31,2.18c7.68,2.67,12.07,9.75,11.49,17.64ZM116.5,24.46c.63-3.82-1.52-7.11-5.37-8.14-9.45-2.52-20.67,2.1-21.77,12.95-.35,3.47,1.82,6.36,5.12,7.38,8.71,2.69,20.21-1.26,22.02-12.18Z"/><path d="M263.61,19.29c-1.4,24.88-28.33,38.77-50.9,32.1-8.5-2.51-13.65-9.92-12.81-18.67,2.35-24.53,28.87-37.72,51.23-30.89,7.84,2.39,12.94,9.33,12.49,17.46ZM236.92,35.6c4.94-2.21,7.86-6.68,8.39-11.85.34-3.3-1.57-6.2-4.78-7.22-9.62-3.05-21.34,1.79-22.35,12.7-.29,3.11,1.2,5.78,4.14,7.02,4.51,1.9,9.82,1.5,14.61-.64Z"/><path d="M506.86,32.61l-26.7.03c-1.17,1.35-1.94,3.16-2.5,5.23l30.05.06-4.05,13.82h-48.8c3.23-8.82,8.09-16.63,10.71-25.48,2.39-8.07,2.28-16.43,4.11-25.03l48.37-.02-3.9,13.84-30.09.03-.68,5.33,26.97.06-3.48,12.12Z"/><path d="M422.36,37.96c7.08.73,13.81-1.74,17.03-8.15l17.46.03c-7.1,18.3-29.22,26.89-47.29,21.67-8.39-2.42-13.49-9.69-12.77-18.32,2.03-24.41,27.74-38.01,49.56-31.62,9.65,2.83,14.76,11.99,12.39,21.63h-17.4c.27-3.65-1.58-6.57-5.01-7.52-4.15-1.15-8.76-.88-12.7,1.02-4.92,2.37-7.75,7.16-8.55,12.4-.73,4.81,2.38,8.34,7.28,8.85Z"/><path d="M315.36,20.94l-4.18,14.64-27.91.09-4.79,16.07h-17.48s14.85-50.52,14.85-50.52l46.7.06-4.25,14.55h-29.02c-.7,1.62-1.13,3.01-1.6,5.07l27.69.06Z"/><polygon points="368.43 20.95 364.23 35.6 336.3 35.65 331.52 51.75 314.05 51.75 328.9 1.22 375.56 1.27 371.43 15.8 342.22 15.82 340.71 20.89 368.43 20.95"/><polygon points="162.58 51.77 145.09 51.73 155.33 16.98 137.28 16.76 141.86 1.24 195.48 1.24 191.04 16.82 172.84 16.9 162.58 51.77"/><polygon points="384.62 51.69 367.11 51.77 381.95 1.26 399.45 1.24 384.62 51.69"/></svg>);

const SB_CONFIG_KEY="finanzas_sb_config";
const getSBConfig=()=>{try{return JSON.parse(localStorage.getItem(SB_CONFIG_KEY)||"null");}catch(e){return null;}};
const setSBConfig=(cfg)=>{localStorage.setItem(SB_CONFIG_KEY,JSON.stringify(cfg));};
let _sb=null;
const getSB=()=>{if(_sb)return _sb;const cfg=getSBConfig();if(cfg?.url&&cfg?.key){_sb=supabase.createClient(cfg.url,cfg.key);return _sb;}return null;};

function MainApp({user,onLogout,userRole}){
  const[tab,setTab]=useState("registro");
  const[viajes,setViajes]=useState([]);
  const[tarifarioList,setTarifarioList]=useState([]);
  const[filmmakers,setFilmmakers]=useState([]);
  const[loading,setLoading]=useState(true);
  const[selected,setSelected]=useState(new Set());
  const[filterMarca,setFilterMarca]=useState("");
  const[filterPersona,setFilterPersona]=useState("");

  /* Month navigation */
  const now=new Date();
  const[viewMonth,setViewMonth]=useState(now.getFullYear()+"-"+String(now.getMonth()+1).padStart(2,"0"));
  const prevMonth=()=>{const[y,m]=viewMonth.split("-").map(Number);const d=new Date(y,m-2,1);setViewMonth(d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0"));};
  const nextMonth=()=>{const[y,m]=viewMonth.split("-").map(Number);const d=new Date(y,m,1);setViewMonth(d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0"));};
  const monthLabel=(()=>{const[y,m]=viewMonth.split("-").map(Number);return ML[m-1]+" "+y;})();

  /* ── Selected filmmaker for registration ── */
  const[selFM,setSelFM]=useState(null);

  const userEmail=user?.email||"";

  const loadData=async()=>{
    const sb=getSB();if(!sb)return;
    setLoading(true);
    try{
      const[vRes,tRes,fRes]=await Promise.all([
        sb.from("movilidad").select("*").order("fecha",{ascending:false}).limit(1000),
        sb.from("tarifario_movilidad").select("*").eq("activo",true).order("nombre"),
        sb.from("filmmakers").select("*").eq("activo",true).order("nombre")
      ]);
      if(!vRes.error&&vRes.data)setViajes(vRes.data);
      if(!tRes.error&&tRes.data)setTarifarioList(tRes.data);
      if(!fRes.error&&fRes.data){setFilmmakers(fRes.data);if(!selFM&&fRes.data.length>0)setSelFM(fRes.data[0].id);}
    }catch(e){console.warn("Load error:",e);}
    setLoading(false);
  };

  useEffect(()=>{loadData();},[]);

  /* ── Filtered by month ── */
  const monthViajes=useMemo(()=>viajes.filter(v=>v.mes===viewMonth),[viajes,viewMonth]);
  const filtered=useMemo(()=>{
    let list=monthViajes;
    if(filterMarca)list=list.filter(v=>v.marca===filterMarca);
    if(filterPersona)list=list.filter(v=>(v.user_name||"")==filterPersona);
    return list;
  },[monthViajes,filterMarca,filterPersona]);

  const pendientes=filtered.filter(v=>(v.estado||"pendiente")==="pendiente");
  const aprobados=filtered.filter(v=>v.estado==="aprobado");
  const rechazados=filtered.filter(v=>v.estado==="rechazado");
  const marcas=[...new Set(viajes.map(v=>v.marca))].sort();
  const totalAprobado=aprobados.reduce((s,v)=>s+parseFloat(v.tarifa||0),0);
  const totalPend=pendientes.reduce((s,v)=>s+parseFloat(v.tarifa||0),0);
  const totalMes=monthViajes.filter(v=>v.estado==="aprobado").reduce((s,v)=>s+parseFloat(v.tarifa||0),0);

  /* ── Registration: viajes for selected filmmaker in viewMonth ── */
  const selFMData=filmmakers.find(f=>f.id===selFM);
  const fmViajes=useMemo(()=>monthViajes.filter(v=>selFMData&&v.user_name===selFMData.nombre).sort((a,b)=>a.fecha.localeCompare(b.fecha)),[monthViajes,selFMData]);
  const fmTotal=fmViajes.filter(v=>v.estado==="aprobado").reduce((s,v)=>s+parseFloat(v.tarifa||0),0);

  /* ── Count per filmmaker ── */
  const fmCounts=useMemo(()=>{
    const c={};
    filmmakers.forEach(f=>{c[f.id]=monthViajes.filter(v=>v.user_name===f.nombre).length;});
    return c;
  },[filmmakers,monthViajes]);

  /* ── Add entry ── */
  const addEntry=async(fecha,locacion,marca,tarifa,nota)=>{
    if(!selFMData)return;
    const sb=getSB();if(!sb)return;
    const{error}=await sb.from("movilidad").insert({
      user_email:selFMData.email||selFMData.nombre.toLowerCase().replace(/\s/g,".")+"@notoffice.pe",
      user_name:selFMData.nombre,
      fecha,
      hora:new Date().toTimeString().slice(0,5),
      locacion,tarifa:parseFloat(tarifa),marca,
      nota:nota||null,
      estado:"pendiente",
      origen:"manual",
      registrado_por:userEmail,
      mes:fecha.slice(0,7)
    });
    if(error)alert("Error: "+error.message);
    else loadData();
  };

  const deleteEntry=async(id)=>{
    if(!confirm("¿Eliminar este registro?"))return;
    const sb=getSB();if(!sb)return;
    await sb.from("movilidad").delete().eq("id",id);
    loadData();
  };

  /* ── Approval actions (individual trips, no email) ── */
  const updateEstado=async(ids,estado)=>{
    const sb=getSB();if(!sb)return;
    const now=new Date().toISOString();
    for(const id of ids){
      await sb.from("movilidad").update({estado,aprobado_por:estado==="aprobado"?userEmail:null,aprobado_at:estado==="aprobado"?now:null}).eq("id",id);
    }
    setSelected(new Set());loadData();
  };

  /* ── Monthly closure: send summary email to Ynes & Gerardo ── */
  const[sendingCierre,setSendingCierre]=useState(false);
  const[cierreMsg,setCierreMsg]=useState("");
  const cerrarMes=async()=>{
    const aprobados=monthViajes.filter(v=>v.estado==="aprobado");
    const pendientesCount=monthViajes.filter(v=>(v.estado||"pendiente")==="pendiente").length;
    if(pendientesCount>0){alert("Aún hay "+pendientesCount+" viajes pendientes de aprobar. Apruébalos o recházalos antes de cerrar el mes.");return;}
    if(aprobados.length===0){alert("No hay viajes aprobados este mes.");return;}
    if(!confirm("¿Cerrar movilidad de "+monthLabel+"? Se enviará el resumen a Ynes y Gerardo para programar los reembolsos."))return;

    setSendingCierre(true);
    /* Build summary by filmmaker */
    const byFM={};
    aprobados.forEach(v=>{
      if(!byFM[v.user_name])byFM[v.user_name]={name:v.user_name,viajes:[],total:0};
      byFM[v.user_name].viajes.push({fecha:v.fecha,destino:v.locacion,marca:v.marca,monto:parseFloat(v.tarifa||0)});
      byFM[v.user_name].total+=parseFloat(v.tarifa||0);
    });
    const byMarca={};
    aprobados.forEach(v=>{
      if(!byMarca[v.marca])byMarca[v.marca]=0;
      byMarca[v.marca]+=parseFloat(v.tarifa||0);
    });
    const totalMes=aprobados.reduce((s,v)=>s+parseFloat(v.tarifa||0),0);

    const sb=getSB();
    if(sb){
      try{
        await sb.functions.invoke("notify-movilidad",{body:{
          type:"cierre_mensual",
          to:["ynes@notoffice.pe","gerardo@notoffice.pe"],
          mes:viewMonth,
          mesLabel:monthLabel,
          totalViajes:aprobados.length,
          totalMonto:totalMes,
          porFilmmaker:Object.values(byFM),
          porMarca:byMarca,
          aprobado_por:userEmail
        }});
        setCierreMsg("Resumen enviado a Ynes y Gerardo");
      }catch(e){
        console.warn("Email error:",e);
        setCierreMsg("Viajes cerrados (email no enviado — configura la Edge Function)");
      }
    }else{
      setCierreMsg("Mes cerrado (sin conexión para enviar email)");
    }
    setSendingCierre(false);
    setTimeout(()=>setCierreMsg(""),5000);
  };

  /* ── Filmmaker management ── */
  const addFilmmaker=async(nombre)=>{
    if(!nombre.trim())return;
    const sb=getSB();if(!sb)return;
    await sb.from("filmmakers").insert({nombre:nombre.trim()});
    loadData();
  };
  const removeFilmmaker=async(id)=>{
    if(!confirm("¿Desactivar este filmmaker?"))return;
    const sb=getSB();if(!sb)return;
    await sb.from("filmmakers").update({activo:false}).eq("id",id);
    if(selFM===id)setSelFM(null);
    loadData();
  };

  if(loading)return(<div style={{display:"flex",alignItems:"center",justifyContent:"center",minHeight:"100vh"}}><Logo width={160}/></div>);

  return(
    <div className="app">
      <div className="top-bar">
        <div>
          <h1>Movilidad</h1>
          <div className="sub">{userRole==="admin"?"Administrador":"Coordinador Audiovisual"} — Registro manual y validación de viajes</div>
        </div>
        <button className="logout-btn" onClick={onLogout}>Salir</button>
      </div>

      {/* Month nav */}
      <div className="month-nav">
        <button onClick={prevMonth}>← Anterior</button>
        <div className="current">{monthLabel}</div>
        <button onClick={nextMonth}>Siguiente →</button>
      </div>

      {/* KPIs */}
      <div className="kpi-row">
        <div className="kpi"><div className="val" style={{color:"#059669"}}>{fmt(totalMes)}</div><div className="lbl">Aprobado ({ML[parseInt(viewMonth.split("-")[1])-1]})</div></div>
        <div className="kpi"><div className="val">{monthViajes.length}</div><div className="lbl">Total viajes</div></div>
        <div className="kpi"><div className="val" style={{color:"#92400e"}}>{pendientes.length}</div><div className="lbl">Por validar</div></div>
        <div className="kpi"><div className="val">{filmmakers.length}</div><div className="lbl">Filmmakers</div></div>
      </div>

      {/* Cierre mensual */}
      {monthViajes.length>0&&pendientes.length===0&&(
        <div style={{background:"#f0fdf4",border:"1px solid #bbf7d0",borderRadius:12,padding:"14px 18px",marginBottom:16,display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:8}}>
          <div>
            <div style={{fontWeight:700,fontSize:14,color:"#166534"}}>Todos los viajes de {monthLabel} están aprobados</div>
            <div style={{fontSize:12,color:"#15803d"}}>Envía el resumen a Ynes y Gerardo para programar los reembolsos</div>
          </div>
          <button className="btn" style={{background:"#059669",color:"#fff",padding:"10px 20px",fontSize:13}} onClick={cerrarMes} disabled={sendingCierre}>
            {sendingCierre?"Enviando...":"Cerrar mes y notificar"}
          </button>
        </div>
      )}
      {pendientes.length>0&&(
        <div style={{background:"#fffbeb",border:"1px solid #fde68a",borderRadius:12,padding:"12px 18px",marginBottom:16,fontSize:12,color:"#92400e"}}>
          Hay <strong>{pendientes.length}</strong> viajes pendientes de aprobación — {fmt(totalPend)}. Apruébalos o recházalos para poder cerrar el mes.
        </div>
      )}
      {cierreMsg&&(
        <div style={{background:"#d1fae5",border:"1px solid #6ee7b7",borderRadius:12,padding:"12px 18px",marginBottom:16,fontSize:13,color:"#065f46",fontWeight:600}}>
          {cierreMsg}
        </div>
      )}

      {/* Tabs */}
      <div className="tabs">
        <button className={`tab ${tab==="registro"?"active":""}`} onClick={()=>setTab("registro")}>Registro Manual</button>
        <button className={`tab ${tab==="validacion"?"active":""}`} onClick={()=>setTab("validacion")}>Validación App ({pendientes.length})</button>

              <button key={f.id} className={`fm-pill ${selFM===f.id?"active":""}`} onClick={()=>setSelFM(f.id)}>

          {selFMData&&(<>
            <div className="card">
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
                <div>
                  <div style={{fontWeight:800,fontSize:18}}>{selFMData.nombre}</div>
                  <div style={{fontSize:12,color:"#a1a1aa"}}>{fmViajes.length} viajes en {monthLabel} · Aprobado: {fmt(fmTotal)}</div>

              {/* Existing entries */}
              <table className="entry-table">
                <thead><tr><th style={{width:110}}>Fecha</th><th>Destino</th><th>Marca</th><th style={{width:90}} className="text-right">Monto</th><th style={{width:90}}>Estado</th><th style={{width:100}}></th></tr></thead>
                <tbody>
                  {fmViajes.map(v=>(
                    <tr key={v.id} className={v.marca==="Agencia"?"agencia-row":""}>
                      <td style={{fontSize:12}}>{v.fecha}</td>
                      <td>{v.locacion}</td>
                      <td>{v.marca==="Agencia"?<span className="badge b-agencia">Agencia (OH)</span>:<span className="badge" style={{background:"#f4f4f5",color:"#52525b"}}>{v.marca}</span>}</td>
                      <td className="text-right" style={{fontWeight:700}}>{fmt(v.tarifa)}</td>
                      <td><span className={`badge ${v.estado==="aprobado"?"b-ok":v.estado==="rechazado"?"b-rej":"b-pend"}`}>{v.estado||"pendiente"}</span></td>
                      <td style={{display:"flex",gap:4,alignItems:"center"}}>
                        {(v.estado||"pendiente")==="pendiente"&&<>

        {/* By marca */}

          const ms=Object.values(byMarca).sort((a,b)=>b.total-a.total);

              {agencia.length>0&&<>
                <div style={{marginTop:8,paddingTop:8,borderTop:"2px solid #e4e4e7"}}>
                  {agencia.map(m=>(
                    <div key={m.marca} style={{display:"flex",justifyContent:"space-between",padding:"10px 0",fontSize:13}}>
                      <span><span className="badge b-agencia">Agencia (OH)</span><span style={{color:"#a1a1aa",marginLeft:8}}>{m.count} viajes</span></span>
                      <span style={{fontWeight:800}}>{fmt(m.total)}</span>
                    </div>
                  ))}

              </>}
              <div style={{display:"flex",justifyContent:"space-between",paddingTop:12,fontWeight:800,fontSize:15,borderTop:"2px solid #18181b",marginTop:8}}>
                <span>Total aprobado</span><span>{fmt(totalMes)}</span>
              </div>
            </div>
            {/* By person */}
            {(()=>{
              const byP={};
              monthViajes.filter(v=>v.estado==="aprobado").forEach(v=>{
                const k=v.user_name;if(!byP[k])byP[k]={name:k,count:0,total:0,marcas:{}};
                byP[k].count++;byP[k].total+=parseFloat(v.tarifa||0);
                if(!byP[k].marcas[v.marca])byP[k].marcas[v.marca]=0;
                byP[k].marcas[v.marca]+=parseFloat(v.tarifa||0);
              });
              return(<div className="card">
                <div style={{fontWeight:700,fontSize:14,marginBottom:10}}>Por filmmaker</div>

                    <div style={{display:"flex",justifyContent:"space-between",fontSize:13}}>
                      <span style={{fontWeight:600}}>{p.name} <span style={{color:"#a1a1aa"}}>({p.count})</span></span>
                      <span style={{fontWeight:800}}>{fmt(p.total)}</span>
                    </div>
                    <div style={{display:"flex",gap:6,marginTop:4,flexWrap:"wrap"}}>
                      {Object.entries(p.marcas).sort((a,b)=>b[1]-a[1]).map(([m,t])=>(
                        <span key={m} className="badge" style={{background:m==="Agencia"?"#f4f4f5":"#eff6ff",color:m==="Agencia"?"#52525b":"#2563eb",fontSize:9}}>{m} {fmt(t)}</span>
                      ))}
                    </div>
                  </div>
                ))}
              </div>);
            })()}
          </>);
        })()}
        {/* Export */}
        <button className="btn btn-gray" style={{marginTop:8}} onClick={()=>{
          const rows=monthViajes.filter(v=>v.estado==="aprobado").map(v=>[v.fecha,v.hora,v.user_name,v.locacion,v.marca,v.tarifa,v.origen||"manual",v.nota||""]);
          const csv=[["Fecha","Hora","Filmmaker","Ubicación","Marca","Tarifa","Origen","Nota"],...rows].map(r=>r.join(",")).join("\n");
          const a=document.createElement("a");a.href="data:text/csv;charset=utf-8,\uFEFF"+encodeURIComponent(csv);a.download="movilidad_"+viewMonth+".csv";a.click();
        }}>Exportar CSV</button>
      </>)}

      {/* ═══ TAB: TARIFARIO ═══ */}
      {tab==="tarifario"&&(
        <div className="card">
          <div style={{fontWeight:700,fontSize:16,marginBottom:14}}>Tarifario de ubicaciones</div>
          <div style={{fontSize:12,color:"#a1a1aa",marginBottom:16}}>Cada zona tiene una tarifa fija de movilidad. La app de campo y el registro manual usan este tarifario.</div>
          {tarifarioList.length===0?<div className="empty"><div className="empty-icon">📍</div><div style={{fontWeight:600}}>Sin ubicaciones</div></div>:
          <table>
            <thead><tr><th>Ubicación</th><th>Descripción</th><th className="text-right">Tarifa</th><th></th></tr></thead>
            <tbody>{tarifarioList.map(t=>(
              <tr key={t.id}>
                <td style={{fontWeight:600}}>{t.nombre}</td>
                <td style={{color:"#a1a1aa",fontSize:12}}>{t.descripcion||"—"}</td>
                <td className="text-right" style={{fontWeight:700}}>{fmt(t.tarifa)}</td>
                <td><button className="del-btn" onClick={async()=>{if(!confirm("¿Desactivar "+t.nombre+"?"))return;const sb=getSB();if(!sb)return;await sb.from("tarifario_movilidad").update({activo:false}).eq("id",t.id);loadData();}}>✕</button></td>
              </tr>
            ))}</tbody>
          </table>}
          <form onSubmit={async(e)=>{e.preventDefault();const f=new FormData(e.target);const nombre=f.get("nombre")?.trim();const tarifa=parseFloat(f.get("tarifa"));if(!nombre||!tarifa){alert("Completa nombre y tarifa");return;}const sb=getSB();if(!sb)return;await sb.from("tarifario_movilidad").insert({nombre,tarifa,descripcion:f.get("desc")?.trim()||""});e.target.reset();loadData();}} style={{display:"flex",gap:8,marginTop:14,alignItems:"center"}}>
            <input name="nombre" placeholder="Nueva ubicación" required style={{flex:1}}/>
            <input name="tarifa" type="number" placeholder="Tarifa S/" required min="1" style={{width:100}}/>
            <input name="desc" placeholder="Descripción" style={{flex:1}}/>
            <button type="submit" className="btn btn-dark">Agregar</button>
          </form>
        </div>
      )}

      {/* ═══ TAB: EQUIPO ═══ */}
      {tab==="equipo"&&(
        <div className="card">
          <div style={{fontWeight:700,fontSize:16,marginBottom:4}}>Filmmakers</div>
          <div style={{fontSize:12,color:"#a1a1aa",marginBottom:16}}>Equipo de campo. Agrega o desactiva filmmakers. Cuando la app esté lista, se vincularán por email.</div>
          {filmmakers.length===0?<div className="empty"><div className="empty-icon">👥</div><div style={{fontWeight:600}}>Sin filmmakers</div></div>:
          <table>
            <thead><tr><th>Nombre</th><th>Email</th><th className="text-right">Viajes ({ML[parseInt(viewMonth.split("-")[1])-1]})</th><th></th></tr></thead>
            <tbody>{filmmakers.map(f=>{
              const cnt=monthViajes.filter(v=>v.user_name===f.nombre).length;
              const tot=monthViajes.filter(v=>v.user_name===f.nombre&&v.estado==="aprobado").reduce((s,v)=>s+parseFloat(v.tarifa||0),0);
              return(
              <tr key={f.id}>
                <td style={{fontWeight:600}}>{f.nombre}</td>
                <td style={{color:"#a1a1aa",fontSize:12}}>{f.email||"—"}</td>

            <input name="nombre" placeholder="Nombre del filmmaker" required style={{flex:1}}/>
            <input name="email" placeholder="Email (opcional, para vincular app)" style={{flex:1}}/>
            <button type="submit" className="btn btn-dark">Agregar</button>
          </form>
        </div>
      )}
    </div>
  );
}

/* ── Inline new entry row component ── */
function NewEntryRow({onAdd}){
  const[fecha,setFecha]=useState(new Date().toISOString().slice(0,10));
  const[loc,setLoc]=useState("");
  const[marca,setMarca]=useState("");
  const[tarifa,setTarifa]=useState("");

  const handleSubmit=()=>{
    if(!fecha||!loc||!marca||!tarifa){alert("Completa fecha, destino, marca y monto");return;}
    onAdd(fecha,loc,marca,parseFloat(tarifa),"");
    setLoc("");setMarca("");setTarifa("");
    setFecha(new Date().toISOString().slice(0,10));
  };

  return(
    <tr className="new-row">
      <td><input type="date" value={fecha} onChange={e=>setFecha(e.target.value)}/></td>
      <td><input type="text" value={loc} onChange={e=>setLoc(e.target.value)} placeholder="Destino..."/></td>
      <td>
        <select value={marca} onChange={e=>setMarca(e.target.value)}>
          <option value="">Marca...</option>
          {MARCAS.map(m=><option key={m} value={m}>{m}{m==="Agencia"?" (→ OH)":""}</option>)}
        </select>
      </td>
      <td><input type="number" value={tarifa} onChange={e=>setTarifa(e.target.value)} placeholder="S/" min="1" style={{textAlign:"right"}}/></td>
      <td><button className="btn btn-dark btn-sm" onClick={handleSubmit} style={{padding:"6px 10px"}}>+</button></td>
    </tr>
  );
}

/* ═══ FILMMAKER VIEW (limited) ═══ */
function FilmmakerView({user,onLogout}){
  const[viajes,setViajes]=useState([]);
  const[tarifarioList,setTarifarioList]=useState([]);
  const[loading,setLoading]=useState(true);
  const userEmail=user?.email||"";
  const userName=user?.user_metadata?.full_name||user?.user_metadata?.name||userEmail.split("@")[0];

  const now=new Date();
  const[viewMonth,setViewMonth]=useState(now.getFullYear()+"-"+String(now.getMonth()+1).padStart(2,"0"));
  const prevMonth=()=>{const[y,m]=viewMonth.split("-").map(Number);const d=new Date(y,m-2,1);setViewMonth(d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0"));};
  const nextMonth=()=>{const[y,m]=viewMonth.split("-").map(Number);const d=new Date(y,m,1);setViewMonth(d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0"));};
  const monthLabel=(()=>{const[y,m]=viewMonth.split("-").map(Number);return ML[m-1]+" "+y;})();

  const loadData=async()=>{
    const sb=getSB();if(!sb)return;
    setLoading(true);
    try{
      const[vRes,tRes]=await Promise.all([
        sb.from("movilidad").select("*").eq("user_email",userEmail).order("fecha",{ascending:false}).limit(500),
        sb.from("tarifario_movilidad").select("*").eq("activo",true).order("nombre")
      ]);
      if(!vRes.error&&vRes.data)setViajes(vRes.data);
      if(!tRes.error&&tRes.data)setTarifarioList(tRes.data);
    }catch(e){console.warn("Load error:",e);}
    setLoading(false);
  };
  useEffect(()=>{loadData();},[]);

  const monthViajes=useMemo(()=>viajes.filter(v=>v.mes===viewMonth),[viajes,viewMonth]);
  const aprobados=monthViajes.filter(v=>v.estado==="aprobado");
  const pendientes=monthViajes.filter(v=>(v.estado||"pendiente")==="pendiente");
  const totalAprobado=aprobados.reduce((s,v)=>s+parseFloat(v.tarifa||0),0);

  const addEntry=async(fecha,locacion,marca,tarifa,nota)=>{
    const sb=getSB();if(!sb)return;
    const{error}=await sb.from("movilidad").insert({
      user_email:userEmail,user_name:userName,fecha,
      hora:new Date().toTimeString().slice(0,5),
      locacion,tarifa:parseFloat(tarifa),marca,
      nota:nota||null,estado:"pendiente",origen:"manual",
      registrado_por:userEmail,mes:fecha.slice(0,7)
    });
    if(error)alert("Error: "+error.message);
    else loadData();
  };

  const deleteEntry=async(id)=>{
    if(!confirm("¿Eliminar este registro?"))return;
    const sb=getSB();if(!sb)return;
    await sb.from("movilidad").delete().eq("id",id);
    loadData();
  };

  if(loading)return(<div style={{display:"flex",alignItems:"center",justifyContent:"center",minHeight:"100vh"}}><Logo width={160}/></div>);

  return(
    <div className="app">
      <div className="top-bar">
        <div>
          <h1>Mi Movilidad</h1>
          <div className="sub">{userName} — Registro de viajes</div>
        </div>
        <button className="logout-btn" onClick={onLogout}>Salir</button>
      </div>

      <div className="month-nav">
        <button onClick={prevMonth}>← Anterior</button>
        <div className="current">{monthLabel}</div>
        <button onClick={nextMonth}>Siguiente →</button>
      </div>

      <div className="kpi-row" style={{gridTemplateColumns:"repeat(3,1fr)"}}>
        <div className="kpi"><div className="val" style={{color:"#059669"}}>{fmt(totalAprobado)}</div><div className="lbl">Aprobado</div></div>
        <div className="kpi"><div className="val">{monthViajes.length}</div><div className="lbl">Mis viajes</div></div>
        <div className="kpi"><div className="val" style={{color:"#92400e"}}>{pendientes.length}</div><div className="lbl">Pendientes</div></div>
      </div>

      <div className="card">
        <div style={{fontWeight:800,fontSize:18,marginBottom:4}}>Registrar viaje</div>
        <div style={{fontSize:12,color:"#a1a1aa",marginBottom:14}}>Tus registros manuales quedan como pendientes hasta que el coordinador los apruebe.</div>
        <table className="entry-table">
          <thead><tr><th style={{width:120}}>Fecha</th><th>Ubicación</th><th>Marca</th><th style={{width:100}} className="text-right">Tarifa</th><th style={{width:50}}></th></tr></thead>
          <tbody>
            {monthViajes.map(v=>(
              <tr key={v.id} className={v.marca==="Agencia"?"agencia-row":""}>
                <td style={{fontSize:12}}>{v.fecha}</td>
                <td>{v.locacion}</td>
                <td>
                  {v.marca==="Agencia"?<span className="badge b-agencia">Agencia</span>:<span className="badge" style={{background:"#f4f4f5",color:"#52525b"}}>{v.marca}</span>}
                </td>
                <td className="text-right" style={{fontWeight:700}}>{fmt(v.tarifa)}</td>
                <td style={{display:"flex",gap:4,alignItems:"center"}}>
                  <span className={`badge ${v.estado==="aprobado"?"b-ok":v.estado==="rechazado"?"b-rej":"b-pend"}`} style={{fontSize:9}}>{v.estado||"pendiente"}</span>
                  {(v.estado||"pendiente")==="pendiente"&&<button className="del-btn" onClick={()=>deleteEntry(v.id)}>✕</button>}
                </td>
              </tr>
            ))}
            <NewEntryRow onAdd={addEntry}/>
          </tbody>
          {monthViajes.length>0&&<tfoot><tr style={{fontWeight:700,borderTop:"2px solid #e4e4e7"}}>
            <td colSpan={3}>Total</td>
            <td className="text-right">{fmt(monthViajes.reduce((s,v)=>s+parseFloat(v.tarifa||0),0))}</td>
            <td></td>
          </tr></tfoot>}
        </table>
      </div>
    </div>
  );
}

/* ═══ AUTH ═══ */
function App(){
  const[user,setUser]=useState(null);
  const[checking,setChecking]=useState(true);
  const[sbUrl,setSbUrl]=useState("");
  const[sbKey,setSbKey]=useState("");
  const[configDone,setConfigDone]=useState(false);
  const[userRole,setUserRole]=useState(null);
  const[roleChecked,setRoleChecked]=useState(false);

  useEffect(()=>{
    const cfg=getSBConfig();
    if(cfg?.url&&cfg?.key){setConfigDone(true);
      const sb=getSB();
      if(sb){sb.auth.getSession().then(({data})=>{if(data.session)setUser(data.session.user);setChecking(false);});}
      else setChecking(false);
    }else setChecking(false);
  },[]);

  /* Check role after login */
  useEffect(()=>{
    if(!user)return;
    const checkRole=async()=>{
      const sb=getSB();if(!sb){setRoleChecked(true);return;}
      try{
        const{data,error}=await sb.from("user_roles").select("rol").eq("email",user.email).eq("activo",true).single();
        if(!error&&data)setUserRole(data.rol);
        else setUserRole(null);
      }catch(e){setUserRole(null);}
      setRoleChecked(true);
    };
    checkRole();
  },[user]);

  const doLogout=async()=>{const sb=getSB();if(sb)await sb.auth.signOut();setUser(null);setUserRole(null);setRoleChecked(false);};

  if(checking)return(<div className="login-screen"><Logo width={160}/></div>);

  if(!configDone)return(
    <div className="login-screen"><div className="login-box">
      <div style={{textAlign:"center",marginBottom:20}}><Logo width={160}/></div>
      <div className="login-title">Movilidad</div>
      <div className="login-sub">Configuración — Supabase</div>
      <div className="field"><label>Supabase URL</label><input value={sbUrl} onChange={e=>setSbUrl(e.target.value)} placeholder="https://xxx.supabase.co"/></div>
      <div className="field"><label>Anon Key</label><input value={sbKey} onChange={e=>setSbKey(e.target.value)} placeholder="eyJ..."/></div>
      <button className="btn btn-dark btn-full" onClick={()=>{if(!sbUrl.trim()||!sbKey.trim()){alert("Completa ambos campos");return;}setSBConfig({url:sbUrl.trim(),key:sbKey.trim()});_sb=null;setConfigDone(true);}}>Guardar</button>
    </div></div>
  );

  if(!user)return(
    <div className="login-screen"><div className="login-box">
      <div style={{textAlign:"center",marginBottom:20}}><Logo width={160}/></div>
      <div className="login-title">Movilidad</div>
      <div className="login-sub">Registro y control de viajes</div>
      <button className="btn-google" onClick={async()=>{const sb=getSB();if(!sb)return;await sb.auth.signInWithOAuth({provider:"google",options:{redirectTo:window.location.origin+window.location.pathname}});}}>
        <svg width="18" height="18" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
        Entrar con Google
      </button>
    </div></div>
  );

  /* Waiting for role check */
  if(!roleChecked)return(<div className="login-screen"><Logo width={160}/></div>);

  /* No role = no access */
  if(!userRole)return(
    <div className="login-screen"><div className="login-box" style={{textAlign:"center"}}>
      <div style={{textAlign:"center",marginBottom:20}}><Logo width={160}/></div>
      <div style={{fontSize:48,marginBottom:12}}>🔒</div>
      <div style={{fontSize:18,fontWeight:800,marginBottom:8}}>Sin acceso</div>
      <div style={{fontSize:13,color:"#a1a1aa",marginBottom:20}}>Tu cuenta ({user.email}) no tiene un rol asignado. Contacta al administrador.</div>
      <button className="btn btn-dark btn-full" onClick={doLogout}>Cerrar sesión</button>
    </div></div>
  );

  /* admin or coordinador → full coordinator panel */
  if(userRole==="admin"||userRole==="coordinador")return <MainApp user={user} onLogout={doLogout} userRole={userRole}/>;

  /* filmmaker → limited view */
  return <FilmmakerView user={user} onLogout={doLogout}/>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
